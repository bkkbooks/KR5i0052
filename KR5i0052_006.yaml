body:
  text: 易說上經孚佑上帝純陽吕祖天師著乾上乾下乾元亨利貞初九濳龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲旡咎九四或躍在淵旡咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍旡首吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧象曰天行健君子以自强不息濳龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進旡咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞初九曰濳龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世旡悶不見是而旡悶樂則行之憂則違之確乎其不可拔濳龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也九三曰君子終日乾乾夕惕若厲旡咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣九四曰或躍在淵旡咎何謂也子曰上下旡常非為邪也進退旡恆非離羣也君子進德修業欲及時也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也濳龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也濳龍勿用陽氣濳藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也君子以成德為行日可見之行也濳之為言也隱而未見行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危旡咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故旡咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其為聖人乎知進退存亡而不失其正者其為聖人乎古者包羲氏仰觀象於天俯觀法於地中察鳥獸之文與地之宜近取諸身遠取諸物於是作八卦以通神明之德以類萬物之情八卦之元始於乾坤二義乾健坤順所以明太極陰陽之理也貫三才而宗太極統四象而彚五行首之以乾者蓋以為衆卦之父母也非專言天地之位也藴先天一畫之玄啓造化渾淪之用剛健中正純陽不雜乾乃天德之剛也元亨利貞發於文王以天明人也四德之義著於孔子以人勝天也卦而純陽也純心純政終始不渝擴之而廣大行之而通達得之而攸利存之而貞固冥運默成無待勉强此德化之盛惟天與聖人始足以當之耳卦辭之意不專言聖人者不欲以是絶天下也何也乾德者萬物之乾德也天地非虛寂也天人非遐隔也聖人非生而有餘也衆人亦非生而不足也自强不息其致一也三才之立始於乾元而三才之用發於人心是人心者乾坤之變化也易即人心之所藏也有天地而無人心生生之理疇為大之疇為通之疇為利之疇為貞之也人心所至鬼神所至也鬼神所體人心所體也是故擬諸形容象其物宜上稽動變之繁下徵蓍策之應欲人反諸心而自得之也故窮理盡性以至於命一也是以知易心易也以易為書則泥皆未明於大易之祕也善學易者能於一念入微極深研幾適乎萬變周流之妙則虛明寂照之體可以合乎元亨利貞之用也已乾六龍皆聖人也濳見惕躍飛亢惟其時也時下則下時上則上也下非固於隱也上非競於趨也陽德之變化聖人因之而上下也如初有聖德時當側微宜為濳龍之待也凡聖賢抱大經綸皆從濳養中出曰勿用者不用天下也非天下之不用也二之剛健中正出濳離隱猶龍之在田居位不偏處於平易之地也然身雖寄於𤱶畝而德已顯於寰宇乃聲施澤溥之機也曰利見大人者雖非君位有君之德天下利見之也三處下之上乾道猶未革也幸其性體剛健能憂勤惕厲可以當任大責重之地也四處上之下乾道則巳革也欲進而革命猶遲疑於天人去留之際故為或躍在淵之象也然三之將革則待時而厲四之已革則揆時而試皆與乾道相為變化也淵視之田則危矣躍視之見則疑矣躍以安天下也躍而不離乎淵所以安其身也五乘剛而居天位象飛龍在天之慶以聖德而御大器則大人之路亨也制度經綸與天下初為更始非徒恭默而已將以為萬物快睹之休也自五而進則極矣陽極則亢物極則反上九所以有悔也但乾道豈遂以亢終識其通變之術即可復於濳龍之用故不言凶也龍之言亢亦聖人處於時之當亢也時之當亢聖人不能反亢之有悔僅能易亢之無凶也嗚呼天地既閉則顯不如隱萬物思治則默不如語惟其時也堯舜遜上而五者也文王遜五而四者也周公惕於三者也孔子見於二者也亦濳於初者也故曰乾六龍皆聖也六爻說六爻之體初二為地龍之下位也五上為天龍之上位也三四不言龍以人位而當時乘者也而九三一爻居人道之首故獨言乾乾也聖人之乘六龍無所不惕而獨惕於三者因三處上下之間也蓋六龍誠無一首而時乘必有六位乾之下三爻者皆不得位之聖人也就不得位之中而安危復殊軌焉初則濳而不見二則見而不濳三則置身於不濳不見之間鄰於濳見之所難持而又不能遽為飛躍之事而利見之也不能利見則必有反而戕之者矣故聖人危其地而係之辭曰君子終日乾乾夕惕若者惟以進修為實地也噫君子居躬行事反復善道不但處三之危地者利用在惕即地不危而欲以修身見於世者亦利用惕也是以知確乎不拔者惕於濳也間邪存誠者惕於見也進德修業者惕於躍也位乎天德者惕於飛也不失其正者惕於亢也故聖人乘龍御世無時而不惕也乾乾惕語乾卦六爻之後曰用九見羣龍旡首何也九為乾德之極陽極於九剛健之至也極則必反用陽之道也乾以剛健為體而其用則屈伸變化莫測其所向故謂之無首君子體乾之體用乾之用飛濳躍見圓融應化亦不膠於一轍時剛而剛非有意於剛也則非以剛為首也時柔而柔非欲變於柔也則亦非以柔為首也蓋君子夙昔抱負亦龍德也當龍之飛躍天下莫不快覩及其乘氣茫洋窮乎玄閴之際其首終莫能見也嗚呼乾之始物聖稱先天非無首也乾始物而終之聖先天而後之神化之機皆不見其為首也始終先後之間不失其節不失其宜乃所謂則也天循則而行故行而不息君子循則而變故變而不失也是故天道之動靜無端陰陽之回環無始理信然也陽極用九夫乾天也元亨利貞其德也天有四德惟元所統此元之所以為大也元氣弘通品物賴之而生成化機因之而不滯則陰陽之闔闢不偏乾道之始終無間乃天理之本然也故乾道變化各正性命保合太和者此天理之在萬物者也理之在天地者與在人心者無二在人心者與在萬物者亦無二但萬物之生雖或冥頑而此理無不具也故乾之為道或使物隨時而漸變者或使物感氣而卒化者各能正定其性命而保合此生理也且天之運行也行以和也和即所謂資始之元也元為理氣之始天德既以時而成萬物即資元而以始流行之正各保合於太和之中也萬物各保其和則真性不失所以利貞也元不生於元而生於貞也當變化之始為元變化之成為貞不貞無以為元也不元無以能貞也元以得貞貞以起元乃萬物之機軸也聖人於此知大明終始也噫鼓萬物而不激體乾元而有終者正時乘御天之妙用也乾道變化天體至圓行有常度而無停機者天非有體也因星之附麗以為體也陽經陰緯經之體縱緯之體橫天行度以二十八宿為經五星之纒為緯靜而有常者經星主之動而不息者緯星主之體如倚蓋南北二極平分相貫北高南下極中一星旋轉尤速曰天紐星即天之樞也天體不動非不動也旋轉不離乎垣猶樞之啓閉不離乎舊見以為動之用若是耳究其體未嘗有所動也故曰維天之命於穆不己天之所以為天也聖心之運也豈異哉堯舜競業文王緝熙孔子不厭不倦兹皆不待强而自無不息也賢人以下非强以矯之則不能勝矣故曰君子以自强不息夫易之象心之象也心之用易之機也用易者神而明之即心用之也是以六十四卦之大象皆言以也言以者默而會之則知吾心之用與易象中之變化有當然之合也天地萬物之象皆吾心之象也吾心之用即天地萬物之用也故遺心而逐象者非玩易之玄舍象而求心者亦非知易之至也自强不息聖人以天地萬物為一體飛濳惕躍乃物理自然之數也吉凶悔吝乃事理當然之數也故或隱或見非聖人之得已也濳雖聖人之不得己而聖人無不得已之心也故曰樂行憂違確乎其不可拔也憂樂者時也聖人之心無憂樂也從違者時之道也聖人之行無從違也或曰亢龍有悔聖人遭焉則亦濳乎曰在上則戒在下則濳亢非憂違之時也貴極而無位可處高極而無民可近賢人在下位而敵體不應動而皆悔之時也聖人於此惟抑其貴損其高以下乎賢庶不至於亢極之害也如世道衰微人心危險當天下之責豈可委身去之也惟其不以位為心則其處亢也猶其處濳也或曰見龍在田何以言舍也曰聖人濳而修也飛而達也不濳不飛而在田也特以為蘧廬而非所常寓也匪進則退矣此聖人樂行憂違之用也樂行憂違大抵君相之為千古之勳猷易振寸心之誠慤難持故夙興匪懈全從德業之修進也德業修進又從乎知至知終之妙用知之德即乾之至德也天有常運進退不失是天之知也故曰乾知大始知之神化人與天同也昧而不覺者不能復其體也乾之九三以大臣而處危疑之地非以知至知終之惕厲則不能免於傾覆之虞也大凡德之極至為至而至之隱微為幾知其至而求所以至之則可與於微妙之幾矣業之歸宿為終而終之條理為義知其終而求所以終之則可存於精確之義矣幾能動者也義守靜者也處進退之宜知至而進故可與論幾也知終則退故可與存義也雖然知亦未易言也以天地一誠之靈氣凝而為知無心出之能合於變動始終之妙苟非無欲者其孰能之乎知至知終河圖洛書皆以五居中而一居下也大衍之數五十而虛其一也其一者下之一也一者萬物之根荄即大造之化源也故曰天地之道可一言而盡也其為物不二不二一也乾者一數也而初九之濳龍勿用其一之主也聖人繫之曰陽氣濳藏陽在下也下者抱於一也其濳藏者非謂有時而發用也抱一而處即發用而常濳藏也其在下者非謂有時而上也抱一而出即在上而不離乎下也乾卦所謂勿用於濳龍者即大衍所謂勿用之一也四十有九之用變化無窮而未始離乎一也故龍之見躍飛亢六位成矣而未始離乎濳也然而濳之為言也非匿影銷聲伏其身而不見也惟顯諸仁藏諸用精與玄運而神與天符渾渾穆穆韜光斂迹與道為一此聖賢之濳也是故大舜以濳為治則恭已孔子以濳為教則忘言顔子以濳而處易則齊心箕子以濳而䝉難則正志皆體乎濳龍勿用之旨而不違於天者也噫三代而下賢知之士或以意氣自負或以功名自急識時而濳者鮮其人矣乃若留侯之操椎以濳為用者也平陽之飲醇以用為濳者也皆資之近道者也若漢文之謙讓泥於濳矣賈生之歎息失於濳矣所謂濳者勿用而能用能用而勿用故勿用之妙非有德者不能知之陽氣濳藏乾元既始而亨矣有生生不息之機即有生生各具之性生之所存者性性之所含者情正而不偏剛而能化乾之性情也各正性命本體自成物之性情也天無可擬之性情以萬物為性情也萬物有一定之性情即天之性情也是以收斂歸藏乃見性情之實此所謂霜降水涸天根乃見者也然以發生之初推至於化成之後不有乾元何能通物之始不性其情何能久行其正是故始而亨者必乾元也利而正者必性情也蓋謂性者天生之質正而不邪者也情者即性之所欲也若不能以性制情使情流失性則不能久行其正也故君子體乾之用專直而不撓健運而不息事合於理而不偏志絶於邪而不雜乃得乎性情之利貞也性情之實六爻之濳見惕躍飛亢變化不測而藏顯之機固曲暢而無餘矣然萬化歸元即六爻之發越揮散旁通於萬物之情者皆本於自然而然無所勉强也是以大人之乘時即所以御龍御龍所以體元體元所以法天也推而廣之見大則旁通矣體仁則見大矣六爻發揮天地鬼神與道為一也聖人全體乾元亦與道為一以易簡之德合其體以生成之德合其用以先哲圓通合日月之明以闔闢慘舒合四時之序以彰善疸惡合鬼神之吉凶默而契之神而明之無適而非天理之宜也是以堯舜在上而蓂生鳳儀晝不暝宵無光者先天而天弗違也孔孟在下而懼亂臣賊子息邪說橫行者後天而奉天時也聖人所以參贊於先後天之間者以致中和也今夫人莫不有本然未發之中和未發之中即先天也發而中節即後天也堯舜致中和於上者也孔孟致中和於下者也所以先天後天者非有意而別之也以德與之先後也以時與之先後也以道與之先後也與天地合其德大哉乾也伏羲畫之一以專其統也文王象之元以大其生也孔子又名之曰乾知大始以盡其德也始而曰大是至虛而未見乎氣至神而獨妙其靈通天徹地貫古悉今皆一知也惟聖人體之純粹用之中正明於未然行乎當然凖於盈虛消息之間而不流於得喪存亡之繫故能見天地之心而復一元之始也天之數終而復始陽極而剝也乾上而亢也時也時或有過也而道無過也體道而行則不失其正也故曰知進退存亡而不失其正者其惟聖人乎正者貞也乾元之用所歸宿也萬物不貞無以為元也君子不正無以體乾也知進退存亡之正坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合旡疆含弘光大品物咸亨牝馬地類行地旡疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地旡疆象曰地勢坤君子以厚德載物初六履霜堅冰至象曰履霜堅冰陰始凝也馴致其道至堅冰也六二直方大不習旡不利象曰六二之動直以方也不習旡不利地道光也六三含章可貞或從王事旡成有終象曰含章可貞以時發也或從王事知光大也六四括囊旡咎旡譽象曰括囊旡咎愼不害也六五黃裳元吉象曰黃裳元吉文在中也上六龍戰於野其血玄黃象曰龍戰於野其道窮也用六利永貞象曰用六永貞以大終也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習旡不利則不疑其所行也陰雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊旡咎旡譽蓋言謹也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也陰疑於陽必戰為其嫌於旡陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天而地黃易首乾坤而乾統乎坤坤體乎乾者也坤不體乾則其德不順而義非代終矣何以明臣道之當順也曰利牝馬之貞者乾以龍御天坤以馬行地別其限以明陰陽飛伏之分也馬而曰牝順之至也從陽也陰從乎陽則吉疑於陽則凶故曰先迷後得主利先陽而往則為迷錯後陽而往則得其主而利矣兹為陽陰主之義也曰西南得朋東北喪朋安貞吉者西南陰也東北陽也以陰詣陽何以能吉惟政而詣陰則舍朋得主化育以成斯終其慶矣蓋陽非陰之朋也往東北則剛暴是偕失其同心之助往西南則柔嘉為侣而有類應之吉也坤之體以順承為生化之源坤之德以博厚為載物之本坤之攸行以順健為致遠之具坤道之所以為安貞者以濳孚為類應之合也視之商之應宫箎之應塤濳通迅速抑又甚矣象以地順而厚萬物並載坤之謂也君子體此以厚德載物擴包與之量弘仁澤之施生意滿懷靡不翕聚其為承天時行之道也深矣造化之功用有乾以主始有坤以代終主始者無為而專成代終者至柔而健順坤之不先天而生意自裕於中不後天而化機默達於外豈非承順之功用乎觀坤之為道恬退無為其至柔也及其代天有終沛然莫禦動何剛也惟剛乃見其用柔之至矣當淵默無事至靜也想其賦形有定貞固不移德何方也惟方益知其守靜之至矣柔而用剛方以持靜而中德之藏美之至也初陰始生是小人初進之機也曰履霜者一陰之象也堅冰者六陰之象也君子能防微杜漸則不至於危矣故六爻之動變至理之推移防龍戰之危於始則無堅冰之禍於終也卦惟二五柔順中正默應乎乾者也主乎內者無邪曲而直見乎外者有矩則而方故二之曰直方大五之為黃中通理也所謂直方大者乾元資始之氣發見於坤而洪纖高下飛濳動植無所回隱無所錯亂也此非坤之能自大也惟其體乾之大以大也體乾之大以為大夫豈待習而始利耶五之曰黃裳元吉溫恭抑抑不與陽爭渾渾穆穆通中之條理而暢於四肢亦猶是也然諸卦之五皆為尊位而坤獨安於下者配乾之用而避乾之陽也如三之無成從乎陽而不居成也四之括囊順乎陽而不爭智也上六曰龍戰坤失其德矣盛而不己陽所不堪也其血玄黃者陰之傷也非陽之傷也氣陽而血陰也陰疑於陽則血亦疑於玄矣故曰玄黃者天地之雜也曰於野者陰勢泛漫散溢無底是無限制之意也惟其勢之盛也乃其道之窮也用六之言利永貞者戒其變也能守之而終不失其貞則免於戰矣象曰以大終也乾以大始坤以大終守陰之義也聖人之於坤也美而有戒稱而有抑所以明陰陽敬義之大分也此即天地尊卑之妙用陰陽變化之玄機而吾人學問亦即此而寓矣是故敬非他也即坤之直也生生自內而中正無邪者也義非他也即坤之方也生生直達由中及外而方整齊一者也內本直也外本方也非直之而後直方之而後方也始即終之事也終復始之機也此終之不得不成於始非始之有待於終也則知心體自然之妙與天地造化之妙同歸一致者也震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧象曰雲雷屯君子以經綸初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也六三即鹿旡虞惟入於林中君子幾不如舍往吝象曰即鹿旡虞以從禽也君子舍之往吝窮也六四乘馬班如求婚媾往吉旡不利象曰求而往明也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也屯為洪荒未闢乾坤之始交也蓋剛柔二氣感應未孚情意未浹下之陽既處於難際而上之陽又陷乎險中陽為陰遏陰為陽擊所以為屯也然以震遇坎動而不已將出於險故曰大亨貞也利貞以善用其動建侯以善用其貞始治有統而屯可濟矣此卦震為體而坎為用陽制乎陰之說也天地之絪氲方舒剛柔之情性未合淸濁混淆事機未定故曰難生也然以震動之才動乎險中能觀變審時以正為應不為險所困何患不亨也雷雨之動滿盈者震將為雷坎將為雨氣機方動而猶鬱塞盈滿此即是天地初分之候萬物冥昧之交也萬物以人為首故屯為人道之始所以繼乾坤而立極也人之精神與天地之氣化相為閉塞當屯之時不可獨有所往利在建侯以撫萬方則衆效其力屯無不解矣猶言不寧者因陽體未剛初動乎險中也象以雲雷交作閉塞未通屯之謂也君子體此以經綸雲在雷上陰陽始交而未成雨故為屯若雲在雷下則己成雨而為解也經綸治絲之事也經者總其緒而分之象雷之自斂而發綸者理其緒而合之象雲之自散而聚雖然經綸之事豈一人所獨就哉所以利建侯也屯之六爻以二陽為主然五之居體為坎陷而失勢初之居體為震動而得時當屯之世貴在方進之陽不貴已上之陽故初為屯之主也初之在下而曰利建侯者震為長子代父用事初乃長子之爻也但無可進之勢又無共事之人故為磐桓進退之象當斯之時養德於靜待時而動故曰利居貞利建侯也此陰求於陽弱求於强所以為利也二居屯之下乘初之剛是為迍邅之象若守正居貞則不為匪寇之嫌終得君臣之遇也三無濟屯之才徒有妄進之思此不虞為難將有入林之困也能居貞以待養定識超舍去之即為吉也故二之相比久而可字也三之既間則幾不如舍也至於四則正應已而四又比於五故復為乘馬班如也但初之與四本有婚媾之情則求配必合往無不利也故四而應初藉於初之德也五雖有德位之尊而時勢乖違故威福不行而屯其膏矣若能委任於初使之為正則亦可小獲其吉必欲恢弘而强為大事之圖寧不凶耶上六以陰柔之才猶復侈心於好進不安其位之甚也往無所之惟有泣血漣如憂懼而已夫二四之言乘馬初為之乘也上之言乘馬五為之乘也五之乘不如初之乘也五無可進者也初有可進者也故屯之所貴貴於初也雷雨釀陽醖陰而為膏也能為膏者初之德也不字者二之貞也往之者四之遇也屯而無應者五之時未光也噫當屯晦之時天以險制人人亦以正制天故貞以動即可以盡人事以回天運也矣坎下艮上䝉亨匪我求童䝉童䝉求我初筮告再三瀆瀆則不告利貞彖曰䝉山下有險險而止䝉䝉亨以亨行時中也匪我求童䝉童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆䝉也䝉以養正聖功也象曰山下出泉䝉君子以果行育德初六發䝉利用刑人用說桎梏以往吝象曰利用刑人以正法也九二包䝉吉納婦吉子克家象曰子克家剛柔接也六三勿用取女見金夫不有躬旡攸利象曰勿用取女行不順也六四困䝉吝象曰困䝉之吝獨遠實也六五童䝉吉象曰童䝉之吉順以巽也上九擊䝉不利為寇利禦寇象曰利用禦寇上下順也䝉者物之始生稚而未開者也然物無弱而不壯運無塞而不通所以䝉之必亨也䝉者之得亨由明者之善教童䝉而盡初筮之誠告者即不厭再三之瀆究其所以為告從䝉者本來之良以為培養非有矯强之致而然故貞之所以為利而䝉之所以得亨也此卦艮為體而坎為用陰化乎陽之說也夫卦而言䝉正人心惟危道心惟微窒滯未化險而止之時也君子當䝉昧之時即知物之將亨而淺深次序各循其候以教之則不失時而得其中也蓋物之當亨時也亨之順時道也天至而人從志至而氣感非可以妄求也是以君子不違天而動不先物而應匪我求童䝉童䝉求我之謂也初筮則告纍瀆則吝因其機之通不因其志之蔽也時之謂也再三瀆者瀆於此而復瀆於彼物不信而求我不孚而應則取其所不信而示之以不孚也是非䝉之瀆我我之瀆䝉也夫物而䝉也則其天猶全䝉而瀆也則其真已鑿即聖人成已成物之功也象以山下出泉其源可通其流未達䝉之象也君子法之以果行育德果其行如水之必流育其德如水之有本使初筮之誠漸達於懿美即纍瀆之䝉終不蔽於知能且育德者體艮之靜止也果行者體坎之剛中也當行而行當止而止內外交養得其時中之義也深矣䝉之六爻陰為䝉而陽為主所以貴九二與上九也然九二居則得中而上九以剛居上過於中已九二應則得時而上九險而不止失於時已九二有互震之象而能出乎險上九居艮位之終而自止於剛二又為䝉之主也故二之詞曰包䝉吉納婦吉瀆已者容之而待其化也順已者納之而成其德也且以剛接柔能濟其任者也若上九有待於擊是强致之用也故其詞有戒而無與也夫能發天下之䝉者不以已為也以直繩枉而收其名以法裁物而攬其勢皆為寇者也君子之治䝉也如禦寇然機不輕發志不他用惟使䝉之不能為害而已無所利焉而巳矣擊䝉者物與敵者也包䝉者物自正者也擊或過於嚴而不勝包則得其情而無不克矣賢愚均益故二之所以為吉也五以柔中相應真實不雕童䝉之吉也初以朴忠承二以警惕不遑發䝉之利也初以陰居下雖為無知之䝉也亦非不移之䝉也故以人示法不任法也以說感人不强人也若桎梏以往則棄德尚威民免而無恥吝莫甚矣然初之言吝非四之言吝也彼吝在己此吝在民也三之近二也非若初之近二也以柔暗之資失中正之位外雖從善內則懷私苟利所在忘身以狥之已又何有於二也故曰勿用取女為二戒之也二之才能堪任為克家之子而取女則吉如三之天真汨沒失於所克而何有於利也大抵䝉之為䝉也惟蔽於利欲者之為甚也蔽於利欲者始則為䝉終則為邪矣故三不言䝉也三為邪匪之倫也反戒於二者乃責賢者以絶不肖也且大臣當發䝉之任而好佞比淫先自䝉矣烏能以發人之䝉也哉金夫之羞為小人言也取女之戒為君子謀也是以童䝉未鑿之初心即聖人養正之本體聖人已發之功用亦即是童䝉初筮之本體而已所謂大人不失赤子之心者當於斯義而推之乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也象曰雲上於天需君子以飮食宴樂初九需於郊利用恆旡咎象曰需於郊不犯難行也利用恆旡咎未失常也九二需於沙小有言終吉象曰需於沙衍在中也雖小有言以吉終也九三需於泥致寇至象曰需於泥災在外也自我致寇敬愼不敗也六四需於血出自穴象曰需於血順以聽也九五需於酒食貞吉象曰酒食貞吉以中正也上六入於穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也需者從容寧耐而無凌逼之意非悠忽玩易之謂也君子以斯道為體以斯世為任德性堅定品節詳明有所需者乘其時也非乘其便也時之未至遠難而守需也時之已至䝉難而行亦需也進者無逼處者無距故曰有孚也曰光亨貞吉利涉大川者既昭融以晰物理且欵曲以合時宜也此卦乾為體而坎為用貴陽賤陰之說也夫乾之三陽有需於上坎之一陽有需於下陽貴而能下陰賤而不競分不相越德則相須需道所以成也有孚者待時而動不失其信也先時遽進為妄非孚也後時遲疑為愆亦非孚也曰光亨貞吉者正有孚之所致也位乎天位以正中者指九五而言也坎之一陽處乎險中而下當三陽競進如人主處險陷之時而下有强臣竊據非有中正之德稱其天位烏能免於凌逼之嫌哉是故德所以居位也位所以行德也德位並茂則剛柔相附觀變順動往而有出險之功矣象以雲上於天時至氣合需之象也君子因此以飲食宴樂蓋陰陽相得而自成為雨則剛柔相濟亦可自成為功又何容逞鋭於其間哉惟優游安靜俟其德化之有成不溺志於怠荒不侈心於巧利進無所害退無所疑不失其常而自得其樂也六爻之義剛柔同歸於需故需於郊為無咎需於沙不失吉而需於泥不言凶也何也所謂需者不以進退為異也初之在下未可應機處於曠達安靜自守志雖有須而恬然若將終身焉置身於利害之外其愼始之道也二當世難方殷以身近之不免有羣小之譏則失時矣三過剛躁動不安於時承上而亦如初也則無功矣故二不得避言而自阻三不得畏寇而自退惟寬容以濟其任敬愼以備其災始可以為需也四之需於血者迫於時也四為九五之衛位居大臣身當國難下之三陽駸駸欲進懼其凌逼之勢則以身距之也距必相害故傷而有血也然三陽以健為正本無凌上之私而四能易仇以為親改距以為遜同於奉公不懷釁隙聽時之自然則得出穴之安已至於上六處卦之終非塞途者也與三為應則三陽皆五援也但才涼德淺因人為功不得不入於穴以待其至而已矣戰於先而出於後者需道也入於先而待於後者亦需道也所謂剛柔同歸於需也九五處於險中必需同德之援者也陽彚而升陰引而伏險解難夷則惟優游恭已與天下相安於醉飽之樂故曰需於酒食也或謂九五治險之主也何以為酒食是需也豈知陽剛中正不黨不偏安常而能慮變應變而不失常者德之至也且於劻勷急迫之中有和順從容之致立於不測而游於無有所以能招同德之陽而制異類之陰也是以知采薇出車之憂慮乃敬愼不敗之謂也既醉鳬鷖之燕樂即酒食貞吉之謂也樂所以需也懼亦所以需也故曰有所需者乘其時也非乘其便也噫世非可以旦夕治也物非可以俄頃化也需之而已如五在險中上下皆陰不易需也彼能使四之一陰制三陽而不害上之一陰召二陽而相敬則坎者得平險者得夷政教之行不告戒而自孚矣然皆本乎堅忍沉毅不苟於為而後能有為也豈若悠悠忽忽而以秦越視天下者能知需之時義哉坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可長也利見大人尚中正也不利涉大川入於淵也象曰天與水違行訟君子以作事謀始初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也九二不克訟歸而逋其邑人三百戶旡眚象曰不克訟歸逋竄也自下訟上患至掇也六三食舊德貞厲終吉或從王事旡成象曰食舊德從上吉也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九五訟元吉象曰訟元吉以中正也上九或鍚之鞶帶終朝三褫之象曰以訟受服亦不足敬也訟之為卦乾以健而變於剛艮以止而變於險上乾下艮則為遁上乾下坎則為訟艮為止而坎為險故彼以遁此以訟也險而接健訟所由起也然訟非美事可輕舉乎不得已而情真受誣當內訟惕中以止為吉若終訟不已則孚反窒而凶也此卦乾為體而坎為用陽激乎陰之說也夫上剛制下下險伺上剛險相接則內懷奸深外持雄悍致訟之尤也然以剛來得中雖有健訟之資終無好惡之偏能以理惕中必得伸有孚之情而不受入淵之險矣聖人知健訟之為害一則曰惕中吉而即以終凶之危懼之一則曰利見大人而即以入淵之害危之正謂訟不可興使民歸於無訟之化也且訟者乾德之變也故象不曰天水相違而曰天與水違行也天水一氣也變而後相背也乾性動而健水性險而順則乾居變之先也水不能先乾而行也陰不能先陽而唱也天道之與人事一也訟之始也惟剛者始之其成也又剛者遂之故變者乾之為變也亦勢為之也是以知天下之不能無爭者勢也其不容有爭者理為之主也君子體之以作事謀始其防微杜漸之深心不徒絶訟於爭端已發之後殆絶訟於人情未違之先也訟之諸爻其終吉者柔也終凶者剛也初與三終吉者也上則終凶者也初之不永所事者才弱勢卑中懷畏懼心不欲永其訟也三之食舊德者守其常分不與人競心不欲成其訟也初處坎之下三介剛之間雖有正應皆强敵也能以柔心處夫强敵故一則小有言而不求辨一則從王事而不求功此不訟而止訟者也所以皆獲吉也二四皆剛也所居則柔故一則以分自安一則以義自變能訟而能不克訟者也但二居坎體則其中險尚有欲訟之私四居乾體則其心夷終無搆訟之意所以二止於無眚四則得其吉也曰歸而逋其邑人三百戶曰渝安貞者何也蓋民受中以生所謂命也天之所受何有於危何有於凶惟心有所偏則氣隨之而起釁生事命因以失矣是舍其所有之安而自罹於危棄其所有之吉而反就於凶也若能以柔制剛復其所受之中則善氣相迎惡機濳弭如二之退居小邑而甘為屈服之休四之舍置險途而得安貞之吉矣五以中正之德為訟之主是藏其形迹以避名約其奉御以遠利正本淸源大畏民志使民各得其情而安於旡訟之吉也若上九者剛而不柔極而不已始則訟人終為人訟鞶帶三褫其誰咎哉鍚帶而被褫較之卻邑而無眚者知過遠矣嗚呼訟非治世之事也民之不畏於下而以詞相陷國是不定於上而以議相激德其衰己有道之世其誰是耶故無聲無臭者乾德也奏假無言者大君之體乾德也天下失其實心逞其虛訟即為乾德之變也奈何世人不察偏以剛險自用溺於得喪之間者比比是也孰知健而且險雖得之亦為喪也柔而能止雖喪之亦為得也故易之安貞者有得無喪也元吉者無得無喪也吉凶之故詎非人自召之哉坎下坤上師貞丈人吉旡咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也九二在師中吉旡咎王三錫命象曰在師中吉承天寵也王三鍚命懷萬邦也六三師或輿尸凶象曰師或輿尸大旡功也六四師左次旡咎象曰左次旡咎未失常也六五田有禽利執言旡咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也師者兵也兵之動聖人所不得已而言也故寓兵於農不欲以兵示天下也此卦以地為體以水為用陽制乎陰陰歸於陽之說也夫師貴有名貴於擇將又貴於肅律必求老成練達之丈人始得奉天伐暴之正蓋興師必以衆動衆必以正也行以剛中之德始威而有惠勇而有謀雖動乎危險之中而自得乎仁義之號故毒天下而民從正所以計要天下而民悅也無敵於天下者此吉又何咎矣象取於地中有水如水寓於地而水不泄猶兵寓於農而兵不亂君子以容民畜衆利用而藏險居安而慮危皆以不得已之心為之也六爻之義於用師之道無不備矣而其言抑何危懼也因師之初出在於行伍之整肅不可用無制之兵輕於攻取無制之兵縱獲功閫外終必有凶二以剛中之德能勇與謀合威以恩施律以行權則師獲萬全之吉終無敗績之咎三以陰柔之體妄舉囂動之中且無出師之才而當戰爭之任必有師徒撓敗之凶四陰居陰位無克敵之才有量敵之智雖不能戰勝攻取能退舍完師亦無覆敗之咎五柔中居尊便非好兵之主也然或蠻夷擾亂害我生靈不得已而聲罪致討如田有禽而利執言也何窮兵之咎且有丈人以主其律更得二為長子以壯其威則師出萬全矣然不可信任不專使少年之弟子輕舉敗事雖正亦凶也上六柔順承符師當終事正在論功行賞之時也宜優功臣而廣封建待天下以大公無隱之誠又當御才將而絶禍機措天下以可久可遠之業始銷兵鑄農永無亂邦之慮也然六爻之言皆有戒而無喜正謂兵不得已而用之也至其所以為行師之道曰貞也丈人也律以齊其始也吉以制其暴也左次以求全也不惟陰謀掩襲狙詐傾覆之術者無取即桓桓撻武執訊獲醜之盛亦不足尚也其意可測矣且王者之用兵不貴戰也不貴勝也貴其當也貴其節也如五曰田有禽利執言旡咎者亦言始事之當也曰開國承家小人勿用者亦言終事之節也此王者所以異於霸者也王者與物均覆載而以衆為師者也霸者與敵爭雌雄而以已動衆者也若夫末世之行師也鷹隼其卒牛羊其下而惟霑項漸襟之是快又豈王者所忍見哉則執禽之象其義深矣然喜事樂禍之小人亦猶禽也用之追逐可也用之為政是執田之禽而復驅禽於田矣此消兵而反樹兵也易之所深戒者也嗚呼王者之待小人也猶之待敵也王者之用兵也猶之用小人也故曰兵者聖人所不得已而言也坤下坎上比吉原筮元永貞旡咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞旡咎以剛中也不寧方來上下應也後夫凶其道窮也象曰地上有水比先王以建萬國親諸侯初六有孚比之旡咎有孚盈缶終來有他吉象曰比之初六有他吉也六二比之自內貞吉象曰比之自內不自失也六三比之匪人象曰比之匪人不亦傷乎六四外比之貞吉象曰外比於賢以從上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也上六比之旡首凶象曰比之旡首旡所終也比為親輔之義然比繼於師後亦非上世之道也有間而後有比也必以元善之德深窮其故筮决其意始無間斷而永無姑息而貞乃可統天下而咸歸於順從也此卦坤為體而坎為用陰趨乎陽之說也蓋元者人所同得之良上秉之以為倡率下亦從之以為聯合茲亦出於情之不容已也故粹然孚應存此不忍則為元運此不息則為永守此不雜則為貞以純王之德行純王之政得所比而旡咎也能如是四方之求其安者孰不聞風而類應然有衆之所安必有獨違於時而後至者即為衆之所惡故曰不寧方來後夫凶也雖然上以原筮感其感未神下以不寧來其化未光故曰非上世之道也象以地上有水相親無間比之謂也先王體之以建萬國親諸侯則通天下於一身上之情得行於下下之情得達於上所以比天下而無偏黨也君之比天下以德天下之比君也必先以誠如初之有孚盈缶者實心中溢不為虛飾也曰終來有他吉者久而信於人人自孚之得非意之吉也初言他吉者無位而吉吉在人也二四言貞吉者得位而吉吉在已也二居中而靜以待求四近主而行以趨事內不失時外不越位皆得其正者也若夫質本暗昧居非中正六三是也將比於四而四則外比已將比於二而二則正應已乃復比於無首之上則為匪人之比也上六之無首者處險之極無所倚戴而强自立者也人孰與之將何終焉故曰比之無首凶也夫衆陰之所比者五也五為比主而曰顯比則與玄感者異矣爻辭之用軍禮為喻也明非垂裳之治也三驅之禮禽之逆來趣已者舍之背已而走者射之此愛於來而惡於去也故其所施常失前禽也四陰之比趣已者也上之無首背已者也撫降服判用誡異方不得不顯也至於邑人又何誡焉遠則又告近則不誡比得其術矣嗚呼君之而曰比也比之而曰顯也世之所趨也待言說而後喻者喻於淺者也待指麾而後動者動於末者也故九經之治唐虞以下之治也三章之約三代而後之約也故曰不道之道無為之為浩浩乎其至矣哉乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健我而巽剛中而志行乃亨密雲不雨尚往也自西郊施未行也象曰風行天上小畜君子以懿文德初九復自道何其咎吉象曰復自道其義吉也九二牽復吉象曰牽復在中亦不自失也九三輿說輻夫妻反目象曰夫妻反目不能正室也六四有孚血去惕出旡咎象曰有孚惕出上合志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也自乾坤而下陰之用事始於小畜之機也其為德也受坤道之柔順而代母用事以養育乎陽者也曰小畜不但畜止為德亦有畜養之意焉其在於女則上以承夫下以孕子其在於臣則上以承天王下以制强國體卑而力微有制而無害陽氣自抒陰道未行所以得亨也此卦乾為體而巽為用陰承乎陽之說也彖言柔得位而上下應之者因四居巽之下為巽之主上承二陽以行其權下畜三陽以施其德黨勢雖孤德權自重故上下應之也陰據其權而陽乃得亨者內既剛健外逢柔順剛發於中操縱得宜不被摧抑而志意得行也以君子之勢行而上進則正氣伸而小人退陽之尚往如初陰之設施未竟其猶密雲不雨自我西郊之謂乎象以風行天上披拂遠物宜小畜之也君子體此動止有度言語有章聚文德於一身振芳名於海內是亦小畜之義也六爻之辭俱無凶戒獨上九言征凶者為陽言也虞陰之至於盛也虞以順而為逆也虞以制下者而敵上也蓋陰陽消長在乎幾微之際所當謹也如初與二皆言復者因乾非在下之物進而上升則為復也初之復也以道德自持正應在四故曰復自道也二之牽復也似乎藉援以同德在下故曰亦不自失也陽性至健而復以道也復以牽也上無所逼下有所全故不為亢激之患若三之剛而不中無自守之節舉動不得自由則四所必抑也既為所抑將有說輻之象而必至於反目之爭也四以一陰居於衆陽之中凌逼所不免也但虛中巽體能制於下之三陽而不為暴孚於上之二陽而得其助則合順以制逆害去而懼除矣若夫居陽而體陰者五也以巽之陰畜乾之陽誠意相孚既足以固衆志而不忍離且又足以召賢豪而不敢背推其富以益之得道之助者多矣至於上九則巽陰至此而盛乾陽至此而窮故陽不復進而受畜也陽受畜則不犯陰陰體順則不侵陽陰陽兩無所傷故曰既雨既處也陰之尚德至此亦已成矣陰德將盈反非陰之福也故於月為幾望之月也如陽復上征則為陰所疑矣惟其幾望而不至於望則巽德自全陽而不使其征則乾德無損也統而論之密雲不雨者陰力之微也既雨既處者陰德之盈也陽唱陰和陽薄於陰陰能固之然後蒸而為雨陰先陽唱陰抗於陽陽失其制故不能和而成雨是以陰之不能畜陽勢也以一陰而畜五陽者數益不勝也然巽之為陰以和以順能上能下以柔順之德孚於上下彼此攣係而助之也陰為陽助巽德益盛乾勢益孤則知柔之制剛弱之制强豈一朝一夕之故哉其所積者然也但義取諸風風者有氣而無質者也風行天下則能施及萬物而所畜者大風行天上則惟卷浮埃止飛鳥其所畜者小矣君子觀小畜之義則以懿美其文德如文王之演易箕子之敘疇非懿文德之謂哉嗚呼志在明夷業在小畜皆聖賢不得時者之待也兌下乾上履虎尾不嘻人亨彖曰履柔履剛也說而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也象曰上天下澤履君子以辨上下定民志初九素履往旡咎象曰素履之往獨行願也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也六三眇能視跛能履履虎尾嘻人凶武人為於大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為於大君志剛也九四履虎尾訴訴終吉象曰訴訴終吉志行也九五夬履貞厲象曰夬履貞厲位正當也上九視履考祥其旋元吉象曰元吉在上大有慶也易之一書泄天地之苞符盡人事之變化原為人涉世而作也故其辭多危曰履虎尾則危之甚也危非自至也觸其機則所在皆焦原順乎理則所至皆坦道顧名思義聖人本示人以處危之道也此卦以乾為體以兌為用陽過乎陰陰承乎陽之說也彖言柔履剛者以柔躡剛之後將以見其危也然而君子自無危也兌以為說乾以為應上不驕淫下不諂媚悅非乘戾應非佞邪何自而得危也且建中表正德稱其位有說於外無疚於心禮樂文章自能光顯而丕變也象取於上天下澤蓋言天有定分之施而人多强得之欲君子體此各因其定分制為典禮以辨之使民安於分之所當得則往來皆亨矣初言素履愼於始也如君子在下僅卑而自屈高而自負非也必安履其素富貴不移寵辱不奪不為物遷又不與物競便否塞不能抑之何懼之有夫在下而往猶易全也至於當位與世涉矣而二能以陽處陰居易俟命獨行其道故為履道坦坦幽獨守貞之象然世非有險途也以吾之行險而觸其險也如履在於道吾己處於平易不爭之地矣豈與世相波流哉恬淡自足不失其幽乃為貞吉也初之曰往居在下而非忘世也二之曰幽處在事而非逐世也以之應乾宜其亨也若夫三之進不量力行不度德而强以千世則為武人之凶矣且處乾之下居兌之上宜以道為說而反以武為悅無中正之德而有剛愎之用必上厲下凶播惡於衆而取傾敗也四之訴訴危機暗伏非中道也彼能知戒懼不敢自肆履說而應乎剛則終獲吉也此終其位之吉也非終其身之吉也五有剛暴之才又居於危險之地尊而無制勢可為也剛而難言應不當也任其逞欲而行危多出於所恃也矣故云夬履而厲然求吉之盡善者惟上九之位也其辭曰視履考祥其旋元吉蓋履之為道貴其祥也於始而占於終而考天之降祥豈有所嗇而有所篤哉賦吾以善賦吾以祥也履無不善則動無不祥以祥而往以祥而旋始終無虧吉乃全矣故君子之為視也不視於天不視於人而惟視於履其時危而其事不危非危也其事危而其身不危非危也若非履之為視而以苟免為安是處兌而不應乎乾者也若以躁動自快是履乾而不體乎兌者也即幸而不值乎危亦終非吉道也而安知其果不危也統而論之履之猶言乎履其主於行者也而初曰素履則行不越其位二曰幽人則事不改其貞皆能行而愼於行也三勇於行而凶也四懼於行而吉也五鋭於行不得其輔而厲也上反其初進退得宜則有慶矣甚矣不得其時而躁進其為人害也必矣易之於陰陽動靜之分剛柔進退之際深致意焉故曰易為涉世而作也乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外陰內健而外順內君子而外小人君子道長小人道消也象曰天地交泰后以裁成天地之道輔相天地之宜以左右民初九拔茅茹以其彚征吉象曰拔茅征吉志在外也九二包荒用馮河不遐遺朋亡得尚於中行象曰包荒得尚於中行以光大也九三旡平不陂旡往不復艱貞旡咎勿恤其孚於食有福象曰旡往不復天地際也六四翩翩不富以其鄰不介以孚象曰翩翩不富皆失實也不戒以孚中心願也六五帝乙歸妹以祉元吉象曰以社元吉中以行願也上六城復於隍勿用師自邑告命貞吝象曰城復於隍其命亂也泰者天地交通貞元會合之謂本世運以推其機實從天運以定其數故聖人之道與造化相為消息也而或先焉或後焉往來各有相成之妙先之而圖也後之而維也體天之心以用天之權則天莫之違而天下亦不難為也故曰吉亨之卦以乾為體以坤為用陰輔乎陽之說也蓋時當其泰天地以氣交而萬物化生無不通也君子以心交而致治之志無不同也且君心之所存者皆陽明之德而陰暗不足以纍之君心之所發者皆剛健之才而柔順不足以雜之是以信而任者皆君子疏而遠者皆小人豈知小以成其大之來經國之謀曰長大以制其小之往而害民之事日消矣然世運之盛衰往來莫測不欲否者天也不常泰者亦天也故否泰之際乃天與聖人交相為賴而交相為用之際也象取乎天地交泰以裁成輔相為宜者正言天以一氣渾淪明四時而經九野善萬物於當然之用聖人輔而相之教之以法天時因地利秩人倫於一定之符若此者敦元復性將以開萬世之泰焉於爻辭見之矣初之拔茅以一人倡之羣賢彚起而從之是先天而圖也二為大臣執中為德待人有包容之恩臨事有馮河之勇既寬而有制且嚴而不苛自得乎中行之尚可不勞而治也若九三之艱貞己處乎陰陽之交時將大變世將大革小人無常往而勢復將來其信然也故當艱難其思慮正固其施為而後可以無咎曰勿恤其孚於食有福者此不憂六四之孚而惟養其善類以施福於天下也食以養陽因其衰而為後天之維也然維於九三猶可為也維於六四不可為也何也陽易往而陰易來也陽之進也有待於拔而陰則翩翩輕疾矣陽之征也有待於連彚而陰則不戒以孚矣至於三之言勿恤者治在於我不在於人也五為泰之主淸心寡欲以應於二是忘勢下賢克行其願能屈陰以從陽者也必賢才輔而政事昌以祉元吉也六之城復於隍泰轉而居否矣邪媚近幸之流交相欺蔽如喪師而不可用擁命而不得行雖有正人亦且窮吝因往來之正不能圖於未亂之前而欲收於已壞之後貞亦可為羞吝也噫聖人能用天之權而不能使天之不否也因天運循環其數有時而塞也故君子不憂天之否而憂聖人盡誠以回天其道尚有時而塞之也故天之未始不可為也在人事之初機而時之未始不可挽也在往來者得其相成之道耳坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也象曰天地不交否君子以儉德辟難不可榮以祿初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也六二包承小人吉大人否亨象曰大人否亨不亂羣也六三包羞象曰包羞位不當也九四有命無咎疇離祉象曰有命無咎志行也九五休否大人吉其亡其亡繫於苞桑象曰大人之吉位正當也上九傾否先否後喜象曰否終則傾何可長也否者天地不交陰陽閉塞之故也泰先言小往大來而後言吉亨者是以天運推之人事也否先言匪人而後言大往小來者是以人事參之天運也以人事參之則知小人用事三綱淪矣九法斁矣非復人道之常盡反乎中正之德不利君子貞也此卦以坤為體以乾為用陽抑乎陰之說也且否之小人順承之小人也陰雖居內陽猶在上其勢相敵故其惡未形而禍未著是以不言凶吝也象因天地不交取之為否君子當此若以德自見必中小人之忌惟收斂其用不行於外以避小人之難更當知幾測微善藏其智不以祿位榮之始為善於處否也夫順承之小人即惡逆之小人惡逆之小人又即順承之小人為之也君子苟樂其順承而不虞其惡逆則未有不為所中而天下之事從此而僨矣故聖人於爻詞之中獨言二五之大人蓋二則因其畏名重義五則因其順時反正當否之時所以深致意於君子之修也如初之居陰在下連二而進志方求用猶未涉事且介於邪正之間而未甘為小人也故其始進也亦為拔茅連茹之象於此能貞則又變為君子而君子於此亦未敢遽必其為小人也至於六二陰已居中而當位矣惟恐君子之不能容也內蓄其邪外示其順雖或包容承順乎君子不敢輕肆其害是亦小人之善也故曰小人吉也小人之吉蓋欲致君子於議論以為竊發之端而大人能以否為亨則豈可亂也君子不亂則小人之勢孤而庶幾自變於否矣六三之包羞位居不當又短於才有害正之心而終不能恣其毒惟自藏其羞而已四當將濟之時而天心厭亂將有轉泰之機况有所命令皆出於道而不為過舉則賞罰得中舉措無失疇敢自離於福祉而反為小人也哉此亦惟無咎乃能展其志也四之言無咎也以剛居柔也五之言吉也以剛居中也君子之所瞻也小人之所憚也曰休否曰傾否非大人不能也否不可以急治而休之於先否不可以終長而傾之於後得此方能為濟否者也然非以身先當其否則不能以身後享其成其亡其亡繫於苞桑先否之謂也心存禍患若繫於苞桑無所庇蔭而不能自安抑何否塞之乃爾也苟能知其否塞而善用之則泰運由之而開矣嗚呼治天下者懷苞桑之念於拔茅之時則否不生矣存傾否之憂於包承之際則否不成矣既否而復戒其成功之難如此曰大人否亨又曰大人吉聖人深致意於否之君子各自行其志毋溺於時之變可也離下乾上同人於野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人於野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志象曰天與火同人君子以類族辨物初九同人於門旡咎象曰出門同人又誰咎也六二同人於宗吝象曰同人於宗吝道也九三伏戎於莽升其高陵三歲不興象曰伏戎於莽敵剛也三嵗不興安行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也上九同人於郊無悔象曰同人於郊志未得也同人者即君子善與人同之道本之以至正相勉之誠行之以大公無我之意然其所以為同者非有偏黨之私惟德是比不同俗而同理出於君子之正乃為於野而亨此卦以乾為體以離為用陽化乎陰之說也以九五中正之德有待於六二之應六二柔中之德有待於九五之感故曰同人也同人之義以乾而行是剛德勝而私情黜故亨而利也利君子貞者蓋以文明之德燭於和同之介而定其取舍之衡得於相應之正也夫人同此心心同此理吾能得其所謂正即能得其所謂通能通天下之志自然渾融萬物纖無間隔之情矣象取於天在上而火炎上其性同也故為同人君子體之必先審異以致同故云類族辨物辨者使親疏貴賤各循其分而不相假借類者使親疏貴賤各遵其制而不相混淆始為大通無弊之道也但同人諸爻俱未盡為全得者惟初居人下而曰無咎也上居人外而曰無悔也此皆以無所私昵亦無所係應不流偏黨之咎也亦終非同人之道也若三之乘墉也四之伏戎也五之用師也皆處於理勢俱屈之時而各有智力相爭之險情之不廣故為有克有弗克之象此皆失其所以為同也二之於宗得其正應故能遏三之戎而使其不興困四之攻而使其弗克然以吝狹之心不能為大同之道似欲行渾穆之義而實起釁隙之端所謂為權首而任其咎者此也故云同人諸爻執同以為同同而不和均未有全得者也嗚呼以同而為異也以易而為險也此起於有所欲也於野則何欲哉無欲則至明矣無欲則至正矣故曰文明以健中正而應君子正也行健不以武而以文明用之則何險之不易相應不以邪而以中正應之則何異之不同是故處上而不害不必下也涉世而不傷不必外也或曰於野亨矣不幾兼愛乎曰此一體之仁也非兼愛之私也兼愛則非文明也非中正也文明中正則雖廓然大公而實井然有辨也故以於野之心而時於宗焉則不為吝以於野之心而時於郊焉則不止於無悔矣今夫元首之重也而手足之輕也心膂之急也而毛髮之緩也然而一體之心未嘗輟也故惟一體推之則統同未嘗不辨異辨異未嘗不統同也天同覆而生物自殊也火同照而辨物有別也噫此同人之真義也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨象曰火在天上大有君子以遏惡揚善順天休命初九無交害匪咎艱則無咎象曰大有初九無交害也九二大車以載有攸往無咎象曰大車以載積中不敗也九三公用享於天子小人弗克象曰公用享於天子小人害也九四匪其彭無咎象曰匪其彭無咎明辨皙也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也上九自天祐之吉無不利象曰大有上吉自天祐也大有者據天下之大勢盡君臣之功業運用得宜調燮無弊以大有為之君再濟之以大有為之臣出其精明乾健之德詳審周密為紀綱法度之治推而廣之無所不通故曰元亨此卦以離為體以乾為用陽用乎陰之說也蓋當大有之世利用柔也故柔之爻吉而剛之爻言無咎也剛之爻有戒柔之爻無戒也然以一柔而納五剛以五剛而應一柔上無所攝下無所陵非以大中之德主之不能也故大中而上下應之曰大有就五陽以柔道相應初之柔而處大也二之柔而居中也三之柔而乘離也四之柔而應天也六之柔而獨制無二陰以分其應也自乾坤而下柔道之善莫過於斯故曰應乎天而時行之至也象取乎火在天上無所不照言文明四燭何物不容君子體此以時當大有固足以振有為也然過於繁盛民物易於善惡之淆以善者揚而顯之惡者遏而絶之又能推天地之弘量揚其所本有遏其所本無則順天休命可為大有之永計耳如初當盛始私感未萌尚無驕盈之害惟艱以處之時時戒謹則可終於無咎二以剛中應主抱負既宏肩荷亦重能以柔順而往則旋轉自如如大車之載矣三居用顯之時又遇下賢之主凡諸大有之謀猷無不可入贊於爾后故曰公用享於天子然剛中靖獻君子能之小人弗克也四以剛近柔主才望日隆寵權曰重不覺自滿而漸流於當局之迷也已故為匪其彭之象五虛中實德能推誠任賢可以固結乎臣民之隱也故曰厥孚交如然君道貴剛太柔則廢更當以威濟之使下之仰上者既懷其德復畏其威則永吉而有備矣上當大有之過將為滿則招損之機已猶幸下從六五履信思順而尚賢自格天心之祐而享其淸和之吉也故曰吉無不利凡若此者惟能有其物而不有然後能物無不有也曰厥孚交如以德感而不以私也曰威如吉以義制而不以情也是能不有其物者也故上下之應皆應其不有物者也此象君主之自明其德則莫非德也初之無害其道廣也二之能載其器大也三之用孚其驕抑也四之匪彭其盈損也亦皆能不有其有而得其有也此皆非六五之為有也若乃居無位之地淸淨高潔則上九不可攖矣諸爻以不有而處有者也上九以不有而為有者也則非六五之所能有也然而非六五之大不能容上九之高則亦六五之有也噫有而能大非柔而善用者其孰能之艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也六二鳴謙貞吉象曰鳴謙貞吉中心得也九三勞謙君子有終吉象曰勞謙君子萬民服也六四無不利撝謙象曰無不利撝謙不違則也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也謙者滿而能持有而不居之義也吾人身在宇宙雖有蓋世功勳返之本來如浮雲耳只因人德器淺薄承載不起便有驕矜之見也若謙德君子處心抑抑視盈若虛則行無不得故亨而終歸於有也此卦以坤為體以艮為用陽止而陰順之說也內止則實而無僞外順則應而不窮所以有終也外不順則為矯拂內不止則為象恭雖或勉强用謙一有所欲則競有所負則矜安能有終乎彖之所謂謙尊而光卑而不可踰者惟謙之為道尊大而光顯故雖卑屈而不可以尚之也不與物校何其尊也不為滿纍何其光也以尊且光者更能卑以自處何可踰之故人能謙則必為人所好矣以之居尊則德因謙而益顯而光自不可掩以之居卑則德因謙而益重而人自不能踰也象取為地中有山高不離卑故曰謙君子體此裒多益寡稱物平施蓋言有終之義也地中有山山雖高峻平而不傾物多植焉亘萬古而如斯也君子體謙之義戒其自滿之心行其謙遜之念則能裒聚其多而增益其寡道在稱物以施得其平而已不盈故裒聚其多也能受故增益其寡也此忘物忘我稱量乎人已之宜而平其施也以我為重非謙也以物為重亦非謙也有所重則有所輕低昻不定謙不終矣無所重無所輕如山之無所凌而無所剝則無傾壞之虞為有終之義也釋卦之義其下三爻體艮者也則皆言吉其上三爻體坤者也則皆言利艮靜而坤順也順則多利靜則多吉也初居艮之下柔和自尚謙而又謙者也則其氣以不盈而安志以能斂而定以同心之德而收弘濟之益即涉險而無患矣二之謙德積中聲譽嘖嘖且發於中心之自然纖無矯飾之私故貞吉也三有剛正之德為上下所歸功在民社然能自視然所謂勞謙之君子也然以師濟之才加之以揖讓之德功莫與爭位可常保故有終吉也四下乘功臣上近大君居多懼之地非利也然柔而得正上而能下則無不利也雖指撝經畫非謙之狀也而曰撝謙者乃大臣事主之謙非循墻巽怵之謂也五柔居尊位以謙得衆中外悅服况勞謙者為之力撝謙者為之謀故為不富以其鄰之象夫謙而為人所與何事不可為即用以征伐亦無不利也上六之謙德雖盛而才力不足用以行師無勘亂之才何以行天討之令僅可征邑國而已就六爻統而論之初非濟川之位五非伐國之才而言涉川征邑者極言謙之能有為也二居位而無應也上居高而無位也則不容以不鳴也然鳴而皆不違乎謙也二承剛而得其止其鳴也鳴以自適故曰中心得也上乘五而失其順其鳴也鳴以自訴故曰志未得也志未得者利在從時中心得者利在守已故一曰貞吉一曰利用行師也謙之為義也止而順則非懦怯而無為順而止亦非阿順而無節曰涉曰勞曰撝曰征伐非任意行權亦非謙之能濟天下之務也嗚呼人之心體本無障礙猶太虛之無物也以無物之心而稱乎物所以得其平也以有物之心而加乎物所以違乎謙也可不知之然世更有貌恭而色佞中非有孚其為謙之賊也歟坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰淸而民服豫之時義大矣哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考初六鳴豫凶象曰初六鳴豫志窮凶也六二介於石不終日貞吉象曰不終日貞吉以中正也六三盱豫悔遲有悔象曰盱豫有悔位不當也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也上六冥豫成有渝無咎象曰冥豫在上何可長也豫者和樂之義也豫則人心和樂事無不宜將溢天下之歡矣然樂不可極聖人深防人欲之流也故曰利建侯行師以愛戴之誠濟之以公憤之舉則萬姓歸心三軍用命克無不利也此卦坤為體而震為用以陰從陽之說也蓋豫起於人心之和而實由於修德之盛順天理合人心朝野悅服其志行也然人而過豫也每流於縱恣事而過豫也每失於寬假如是則不可以經邦訓俗矣惟建侯行師齊之以歡豫濟之以威嚴一理所動上下協應則天地亦如之而不違耳天地之動原無不順者也聖人推造化之樞亦以順而動本諸身而建諸政事者皆順理而無悖則不煩刑罰而民皆悅服於順動之中矣由是天地因之以化成聖人因之以制治而人心安有不從者乎象以雷出地奮鼓天地之和氣萬物莫不和暢故為豫也然雷之奮發也氣機因之而生動及其震迅也氣機亦因之而凛赫未始有寬假之意而為乖戾之失也故作樂崇德以召和也薦上帝配祖考以致敬也以和以敬此聖人示人以豫之道也初應於四濡迹權門自為得志而豫發於音聲三承於四仰視權臣恣情縱欲而豫見乎形色初之輕浮淺露三之驕肆睢盱皆沉溺而不自知者也其凶其悔宜矣五居尊位陰柔不振耽於逸樂以天下之事委之權佞而漫不知省此貞疾之證也猶幸四之承應位雖危而不失其中故曰恆不死也四以有容之度且安處於下既能盡其調燮之功又能殫其披露之隱是為君民相豫者也曰由豫者由由然不過豫也大有得者豫不逼上又能保其下也然而為衆所應亦居於危疑之地矣故聖人戒以勿疑但聚天下之賢者以媚於上不得狥一人之見以成其黨則得矣簪聚於上故取譬焉上六陰柔之極處豫之終已昏迷而不知自反者也然在震之極外有奮迅之機內有渝變之理故當翻然悔悟振之以威武之為而政其冥豫之習此從苦海沉淪指出回頭是岸之謂也曰威而有渝猶言夢中一喚倦後一鞭借震驚而還覺性也此聖人引人以補過之道也諸爻惟二為吉以其處中正而無應能為自守之象豫之最善者也然曰介於石則有競業自持之操曰不終曰則無耽戀自溺之心真見機明决不以豫處豫者也嗚呼惟不以豫處豫而後能保合太和三才一致得其豫之時義也已讀豫之卦而知聖人遏人欲於將萌維天理於未絶戒於順動之中者豈易易哉震下兌上隨元亨利貞無咎彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉象曰澤中有雷隨君子以響晦入宴息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也六二係小子失丈夫象曰係小子弗兼與也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也九五孚於嘉吉象曰孚於嘉吉位正中也上六拘係之乃從維之王用享於西山象曰拘係之上窮也隨者以臣從君之義也王者治化精純揚溢宇內德足以致人之隨而下之情意相洽因有歡然樂從之象也故曰元亨然隨由悅致悅則易涉於私故聖人首戒以利貞蓋隨而不正即為邪僻之道也憑天理以招徠不假私情為聯結始無干譽之咎此卦震為體而兌為用以陽從陰之說也剛來下柔𡽪柔之德立極於上而剛德之人信從於下雖然上無以致人之隨人豈隨之乎故動而悅則凡所以致隨者皆出於精神之欣洽而非名分之朿縛也但世之人非其時而强進者多故當戒之以隨時以正為隨自然人心順應而天下無不隨之矣豈歡虞小補之術哉象取乎澤中有雷雷在澤中動而能靜隨之義也君子推之而應事也葆時止之體為時行之用隨時隨理而此心仍歸於寂然故曰向晦入宴息蓋澄其心於何思何慮之鄉凝其神於勿助勿忘之候得隨時之正者也故諸爻陽不言係而陰獨言係因係之非正應也如初居震之初隨之始也泛以隨人主宰之君不能無渝惟以貞則獲吉以公則有功也二陰柔無守而係戀庸流必有遺失賢豪之過已三道義自持中心有主依名流而舍鄙夫得所隨矣然二係於下三係於上均之為係得失異焉蓋有上下不同之道也四與五同德相隨諫行言聽無求不獲然位高勢盛不免有淩逼之嫌雖正亦凶也戒之以孚於上孚不在道則為容悅道不以明則非知機故孚必在道道必以明乃無咎也五以陽剛中正之君下應乎柔順中正之臣同德相孚嘉謀嘉猷入告爾后自無僻邪之疑也吉何如之上六以陰處上不能從陽小人之勢悍者也故必拘係之乃從也然而强之使隨其隨不固欲其維而不可解則必如王者之享於鬼神盡其誠意是無有不隨矣故曰維之王用享於西山然隨非致凶之道也故諸爻皆不言凶而獨於臣位之極者戒之因獲天下之隨者恐有逼上之凶雖正必戒耳聖人所以明君臣之分也正矣噫貞之所在即為時之所乘而時之所趨即為隨之宜也則知隨時之義大矣哉巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也象曰山下有風蠱君子以振民育德初六幹父之蠱有子考旡咎厲終吉象曰幹父之蠱意承考也九二幹母之蠱不可貞象曰幹母之蠱得中道也九三幹父之蠱小有悔旡大咎象曰幹父之蠱終旡咎也六四裕父之蠱往見吝象曰裕父之蠱往未得也六五幹父之蠱用譽象曰幹父用譽承以德也上九不事王侯高尚其事象曰不事王侯志可則也蠱者積弊致蠱之義也有天下者不事事則事壞而不能無弊矣當蠱之時不可坐諉於氣化必以濟險之才力回天運於復興挽人事於未潰精勤惕厲補弊興衰如涉大川以求必濟之象故取先甲三日之辛以䖍其始取後甲三日之丁以善其終乃乘其機而有所治之也此卦艮為體而巽為用以陽革陰之說也蓋剛上柔下上亢而不能下濟下卑而不能上承因循苟且坐視其弊而莫之救所以成蠱也夫蠱以天下不治言也然亂必有治豈可優游玩愒終任其頽靡也哉當君臣惕厲往有事以治之耳至於治之之事曰先甲三日後甲三日者何也蓋甲於先天卦在東之離也逆數者三則當艮位而日為辛順數者三則當巽位而日為丁物盛於火敗於金先甲為辛盛之衰而蠱之始也後甲為丁蠱之盡而盛之始也故曰終則有始天行也君子法之先甲而圖之豫除其弊於亂之終後甲而為之漸維其機於治之始幹蠱之道盡矣象取於山下有風披拂震蕩變遷無定蠱之義也風從下而上則長養萬物從上而下則剝落萬物如風俗頽壞之時而欲為政權鼓舞之用君子惟剛以振民柔以育德持國脈於惺存回天心於動變斯濟其艱矣初當蠱之始事未盡頽尚可幹旋也如有子而克蓋前愆是為幹父之蠱可以旡咎然既謂之蠱時事已危必詳愼謹密善繼其志終可得吉二以剛乘柔事多拂逆必委曲周旋方克有濟若自以為幹直行無避反失其因革之宜也三當大臣之任更張積弊得幹蠱之權也但過剛不中未免有急遽之悔猶幸巽順而止用之革故鼎新也終無大咎四以柔弱之才遇事寬裕既不忍更張以彰親之過宜安分以承父之艱也故曰往見吝五以柔應剛剛柔相濟君臣一德已相與厲精剔弊善繼善述以光先人之令緒幹蠱之功臣也曰用譽用民譽以為羽儀而徂詐跅弛殆不至矣上九幹蠱既畢則宜釋去權利不事王侯高尚其事也蓋人當處蠱之時不患少事功而患少節義如苟且以置身决裂以措事自多辱已惟緩以投機徐以觀變斯得治蠱之善者也故初之厲首事也二之戒承陰也幹蠱之首時有損益則以意承之處陰之險道難屈伸則以權濟之故曰意承考也二曰道得中也三之幹由凶而趨吉也四之裕由吉而趨凶也五之譽得其濟而功成也六之不事以不用而成用者也君子審於前而决於後者各得其時至事宜之用也是故君子當蠱之難幹有先去而不事者微子季札以之當蠱之既幹有後去而不事者范蠡張良以之先去者欲以覺悟君之心而保宗祀後去者欲以成全君之誼而明臣節皆所以為幹蠱也雖然聖賢之行身或去而不事原其心未有不為天下而深維其終始者豈徒以為高為潔自保自重而坐視其蠱之弊也哉兌下坤上臨元亨利貞至於八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至於八月有凶消不久也象曰澤上有地臨君子以教思旡窮容保民旡疆初九咸臨貞吉象曰咸臨貞吉志行正也九二咸臨吉旡不利象曰咸臨吉旡不利未順命也六三甘臨旡攸利既憂之旡咎象曰甘臨位不當也既憂之咎不長也六四至臨旡咎象曰至臨旡咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也上六敦臨吉旡咎象曰敦臨之吉志在內也臨者監臨之義以君子而進逼小人猶陽道浸長而逼於陰也聖人於陽長之時即慮其衰故曰至於八月有凶八月者由建丑而至建未遁之復萌也當二陽初長之時即慮及於二陰復長之日可見消長之機倐忽變換防之不可不早爾此卦兌為體而坤為用陽制乎陰之說也夫陽得其時方長於下而其勢浸上漸以制乎在上之陰必持之以和悅之德應之以天德之剛內則心氣和平外亦舉動合理始小人受我之臨而不敢為邪此臨之義也然爍金之夏必有伏陰桂滿之夜必有虧魄盈虛之道豈可據耶故曰元亨者幸之以勢也曰利貞者維之以理也曰八月有凶以消長之時惕之也象取於澤上有地地之臨水水盛則地陷矣故陽之逼陰不戒則反為所逼矣君子體之不徒曰教而曰教思無窮不徒曰養而曰容保無疆以蕩蕩之恩淪肌浹髓與地同其廣也與澤同其深也初當陽剛方長之時其勢漸盛必不濫不求感之以正使小人無隙可乘而吾道始得正其行也二近於上舉動得宜權勢在我以誠感之無順無逆則可以為臨之主也三陰柔不正以甘悅臨人而實不利於君子若君子不受其非道之說彼能知而憂之改行從善盡其道以為感則旡咎矣四雖以陰居正下應初九而密比於三之邪恐為所間必切至其臨與正相符乃得旡咎也五處於尊以柔用剛自得其執簡御煩之體矣故曰知臨也陰本柔暗而以明為臨則剛柔相濟行中之謂也上六陰柔在上自遠於陽必敦厚以臨於剛斯吉而旡咎也且任賢之道貴不奪於外物去讒遠色賤貨貴德所以為敦也曰志在內者志不忘於天下之內也噫此卦初與二皆曰咸臨者以下臨上不可凌逼利在感孚所謂咸臨也初尚未當臨陰之任故曰貞吉二當臨陰之任故曰吉無不利正以為主利以為用臨道盡矣三以兌體而逼於剛故為甘臨之象然初與二皆陽德之君子靡隙可乘其術雖工有憂之矣咸臨者君子正大之情也甘臨者小人邪媚之態也咸臨而無不利也甘臨而無攸利也四之至臨臣道也以身為臨下於陽也五之知臨君道也以心為臨委於陽也上六不以高自居志順情厚聽命於陽所謂敦臨也總而論之初則戒以正志行二則戒以未順命若三之憂與四之至五之知六之敦皆為陽道之謀而預防之也噫卦之曰臨時當陽長之初猶世之方盛時也而聖人即防焉爻則僅言其吉卦則預言其凶致意於消長之關者有如是則知盛衰之際不可不貞者也坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣象曰風行地上觀先王以省方觀民設教初六童觀小人旡咎君子吝象曰初六童觀小人道也六二窺觀利女貞象曰窺觀女貞亦可醜也六三觀我生進退象曰觀我生進退未失道也六四觀國之光利用賓於王象曰觀國之光尚賓也九五觀我生君子無咎象曰觀我生觀民也上九觀其生君子無咎象曰觀其生志未平也觀者篤恭而化之象也以二陽在上為四陰所觀仰而觀化以靜制動亦扶陽之道也此卦坤為體而巽為用以陰逐陽之說也夫觀化在民為觀德在已王者必躬修玄德允執其中不以顯而修度者為億兆之作則直以暗而修德者儼明旦之操存乃為有孚顒若之敬也蓋小人盛於下君子欲為天下之大觀必其德順而巽始為恭默化成之主順則心和平而不拂巽則氣沈摯而不浮以是居躬自然建中有極超於聲色之表矣盥而不薦以誠交神而不在物也聖人德感玄應孚信在中顒然可仰不待觀其行事而化一觀示間泯然默運上無所著意下無所庸心誠意相孚神矣哉觀之道乎聖人以神道設教喻之以意而不言天下亦喻於聖人之意不待象指之煩均服於德化之中而不自知矣象取於風行地上遍及庶物觀之義也君子體之巡省四方省觀民俗設為教典同歸於中正之化如風之行地也布於四方無所不厯各得其剛柔緩急之用纖無偏枯動靜之殊則知神以法天省以襲地而觀之道亦至矣然大觀在上疇不欲快覩熙明以為道德之光但初遠於陽柔不及遠為淺見之象宜居以自安若進而干位則吝矣二近於初才識不足為偏見之象亦宜固守退而處內如女之蕭居獨處則貞矣三居下體之極是有可進之時但居上體之下復為可退之地故宜靜觀吾道之通塞而為進退之權衡不可汲汲然苟且徇人輕赴功名以失生平之守也四近於五為觀光之象邦家有光則人主之道德可見矣既覿其休光自當黼黻皇猷大展生平抱負上慰其大觀之主故曰用賓於王者正謂其出不輕其進亦可重也五為大觀之主天下之風氣係焉必反覆詳審內觀我之道德果能建中表正樹生民之望使天下濳移默轉皆有君子之風始為觀民之有徵者也上九雖不得位而德足以為人之觀表故君子之修天下應之也以君子之身為天下之應進則當設教以化民退則當師表以善俗豈可晏然恣逸謂已無與於天下而可自放者乎故曰志未平者其道宜和光同塵其志當出類拔萃不自失其儀表斯無愧於觀望之責也總觀卦之義本小人盛於下而逐君子之象也故諸爻漸近於陽則吉漸遠於陽則凶因陽之爻皆為君子勉之不曰吉而曰旡咎其扶陽之意亦至矣哉震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也象曰雷電噬嗑先王以明罰朿力法初九屨校滅趾旡咎象曰屨校滅趾不行也六二噬膚滅鼻旡咎象曰噬膚滅鼻乘剛也六三噬臘肉遇毒小吝旡咎象曰遇毒位不當也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黃金貞厲旡咎象曰貞厲旡咎得當也上九何校滅耳凶象曰何校滅耳聰不明也噬嗑者有物間於頤中去而合之則害亡而亨通也物去其害治得其平即聖人用獄之心也蓋天地不能以春生而廢秋殺聖人不能以弼教而弛明刑故獄以濟德禮之窮而得中又以妙用獄之道也此卦震為體而離為用陰陽分雜之說也夫一統之時有梗化而違法者是為頤中有物之象必去之而後四海同風也然治獄之道貴於威明明合動而明益顯動合明而動益神威明得中則執法之義與矜恤之仁並至雖濟以用獄之剛自能勝其位也象以雷動於下電明於上震曜相摧陰陽和合噬嗑之謂也先王法之以明罰朿力法其防間之意深矣不言用罰而言明罰明之於先使人知所避不言行法而言朿力法朿力之於初使人知所畏蓋不得已而用刑而不欲用刑者其心也此所謂桑得中而用乎剛也初之滅趾制其小過於始使其惡不得行故在上者可無咎也二乘剛而刑噬過其分三失中而刑噬遇其梗二之滅鼻似過欲服其心亦不為峻三遇毒似吝而時當用刑義亦無咎四之噬乾胏大臣當專征之任者也五之噬乾肉人主當平亂之後者也以威天下故曰得金矢以利天下故曰得黃金也得其情而服其心噬嗑之功於此成矣獨上九過尊而處剛噬之太過流而為暴情與法不協於中人與已亦不得其平如何校滅耳則凶可知矣蓋明不足以恤民之隱而惟苛刻為能如申商斯高之所以毒天下也且物而至於噬而後嗑德下衰已故三辟之興皆叔季也若剛柔不分專用於刑如二之滅鼻三之遇毒皆不免於過也即四之乾胏五之乾肉雖為噬得其道亦恐比於情法之偏也故一則曰艱貞一則曰貞厲惟初之滅趾僅為無咎而上之滅耳不得其中凶不免矣刑其可不愼哉離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政無敢折獄初九賁其趾舍車而徒象曰舍車而徒義弗乘也六二賁其須象曰賁其須與上興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也六四賁如𣊩如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也六五賁於丘園束帛戔戔吝終吉象曰六五之吉有喜也上九白賁無咎象曰白賁無咎上得志也賁者飾也聖人虞文之盛而為是說也天下之事固非文不行然自質而趨文易自文而返質難聖人當文盛之時不得不為末流之弊而先慮及於靡靡之失也文極則往而不返故曰賁亨小利有攸往造化之生也本則為質用則為文文質彬彬剛柔對待文之所由始也此卦以艮為體以離為用陰陽交錯之說也艮之上六來居離之二位柔來文剛居位得中是以亨也乾之九二寄居艮之上爻棄中而就無位之地是以無大利也蓋質勝之時以文濟之文勝之後即以質救之文以濟質質不為陋固文也質以救文雅道之中文亦寓焉能如是則天人之藴相符小利有攸往也柔居剛中文也剛上柔下文而止也故曰文明以止文明以止者是人道當然之文剛柔交錯者乃為天道自然之文言文而必原於天觀變之始事也言天而必及於人化成之終事也則知造化之運遷也自質而生文聖人幹旋也以文而返質故文者不可無也而亦不可盛也象取乎山下有火光明下藴不為風所逐能明而不炫者也君子體之內外修明又不敢自恃惟愼於庶政之操持不輕折獄之果決正所謂文明以止之防也初有德而時在下無所施於天下象為賁趾不以爵祿為榮者也二為文剛之主心志相孚其象賁須應附上而為賁者也如舍車而徒衆人所羞君子所賁也若賁其須則彼此相成矣因居位之與無位異也三處離之極以一陽居二陰之間是陽得陰賁奔走承宣凡所猷為自成色澤乃賁之盛者也曰永貞之吉欲保其剛而不溺於陰也夫藉物為飾而不為物溺此當離之終已有艮之意矣四與初為正應本當賁如而為三所隔欲靜則疑初之應欲進則懼三之難故心雖若白馬之疾亦必待三之不為已害始得與初為婚媾也蓋乘險而求合者君子之所戒也五居得致之位事無所不用其飾即束帛戔戔亦不過制此敦本尚實終為吉者也上九處飾之終飾終則反素矣以質為尚則天下無不足之患上所以得志也是卦內三爻以文明為賁而外三爻以篤實為賁曰皤如曰丘園曰白賁皆尚素也故曰賁無色也聖人虞文之太盛也即聖人妙於用文之道也雖然專任乎文固非化民成俗之宜若必盡去其文亦非因時通變之治也惟於剛柔摩蕩之交天人旋轉之際探文之原救文之弊不流於頽靡無底之患則為章於天者不動而變而化成於人亦可久而可大也矣坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也象曰山附於地剝上以厚下安宅初六剝牀以足蔑羅維且戌一貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑羅維且戌一貞凶象曰剝牀以辨未有與也六三剝之無咎象曰剝之無咎失上下也六四剝牀以膚凶象曰剝牀以膚切近災也六五貫魚以宫人寵無不利象曰以宫人寵終無尤也上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也剝當陰盛之時正誼衰而邪僻盛君子勢孤小人志肆是非顚倒禍亂無常而舉動之際所當加愼也君子知時運之隆替遜言晦跡遵養待時不可輕有所往也此卦艮為體而坤為用陽格乎陰之說也夫剝之繼賁也聖人豈無意乎其為君子之慮患也深矣蓋文盛則道窮所以剝也陽性為健其去陰也決陰性為柔其侵陽也漸故曰柔變剛也邪之傾正曲之撓直萋菲浸潤傷而不覺是為變也剝極於勢五陰而逼一陽剝至於坤則盡剝矣但陽無終盡之理雖坤卦之六陰盛極而未盡者猶存方生者復萌也剝之不終為剝也此天行之道也當剝之時强亢激拂如盡力以排之則身殞而功不就故宜順而止之也順而止之不徒為今日之消虛且為日後之盈息也蓋君子之道陽道也消息盈虛隨陽而轉所以合天也象以山附於地為下所凌剝之義也君子以天下為宅欲其安寧厚載則不薄小人而厚之貽之休養使為我用猶山之不讓土壤是所以治剝也但事異世殊陰當剝陽之始雖小人未能即去君子然已侵其權竊其位害正之勢漸行矣故自足而辨自辨而膚剝以漸而變也君子不能防之於早身之下足之上不免於切近之災也三為羣陰之中五為羣陰之極而曰無咎無不利者一則應陽一則承陽也小人知有君子則君子亦不嚴絶於小人就其意向之私開以補過遷善之門不使終為剝也即所謂厚下之心也上以一陽獨存天留一君子以延危微之關也曰碩果不食天遺其實以復生也剝未盡而復生此非消長之機乎當此時君子居之則為衆陰所載象為得輿也小人居之其欲未厭則必剝害君子然違於天而窮於道亦自失其所覆故為剝廬之象也噫大抵小人之欲去君子也不過欲縱其志以利其身耳而不知君子既盡大道淪夷家危國破小人亦無所容其身矣是卦也於君子則勸之容小人於小人則戒其剝君子扶陽抑陰委曲以致其意聖人為世道人心之計也深矣震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎象曰雷在地中復先王以至日閉關商旅不行后不省方初九不遠復旡祗悔元吉象曰不遠之復以修身也六二休復吉象曰休復之吉以下仁也六三頻復厲無咎象曰頻復之厲義無咎也六四中行獨復象曰中行獨復以從道也六五敦復無悔象曰敦復無悔中以自考也上六迷復凶有災眚用行師終有大敗以其國君凶至於十年不克征象曰迷復之凶反君道也復者一元復起之義君子既往復來陽和旋轉吾道發舒自可以漸有為而亨也陽既復已光亨而盛則已之出入固無憂疑而朋類之來亦無阻抑故曰出入旡疾朋來無咎然自姤至復陰消陽長反覆計之當有七日之循環也此卦以坤為體而震為用以陽進陰之說也夫陽以上為順順動而行則不疾不徐可以養我之元氣而善其出入而朋亦得附我之操存而歸於順動此天以時而開人人以定而勝天默為消息而迎其剛反之機也所謂反復其道者蓋剝而將盡君子之勢已窮剛而復反而天地之心未遠準之以來往之期當知七日之復凡卦氣分流每卦得六日七分之半茲言七日舉成數而言也六十四卦無非天地之心寓焉而獨見於復者正惟動靜之間為能見其心也天地之心不欲消物而欲生物當消之際其心隨物已斂及生之時其心又隨物而顯故君子推於消長之間動靜之際而天地之心隱然可得其端倪矣象取乎雷在地中以動為靜陽氣漸生復之義也先王以微陽不養氣則不固至陽至之日閉其道路之關止其省方之事守精一於危微之候茲燮陰陽以敷教贊化育以奉天默用其裁成之道也是以柔之盡者剛之反靜之極者動之機乾陽之變化以一而成六十四者也故剝復相連復之下爻即剝之上爻也引而伸之乾坤固無一定之機而陰陽又豈有膠滯之理耶如初以陽居陽情識之染未深真妄之關未逈天良一觸固有昭然故其復為不遠也二柔順中正外無浮氣之矜內無勝心之恃不敢為泥自能安就乎初之仁也乃為休復之吉三也既不能居柔而守之以仁每欲尚剛而奪之以義出入於理欲之關而莫為之警故為頻復之象然能操心愓厲則為頻復之安不為頻復之危也四居陰之中獨與初應是恥凡民而以豪傑自期卻塵迷而以天心獨復不偏不倚獨得乎中行之善也五中順居尊操存貞固以至誠之體敦於無息之功自然天理流行屛其私而完於初也何悔之有上六居復之終最遠乎陽不知所省此在復而自迷者也且陰柔之人暗不自明狠而好殺絶天之道失人之心俯仰交慚有災眚矣不固其本而務遠圖故以其國君凶若終不復其初而逐於外將有十年不克征之敗也已是故求勝於外者非善復其國者也求理於外者非善復其心者也商旅不行外者不入也后不省方內者不出也不行不省則情忘識泯人淨而天完矣此真見天地之心而善復者也聖人無失故無復也衆人不能無失失而後有復者諸爻是也失而不能復者上六是也曰休曰獨曰敦曰頻曰迷非天之降才殊也蓋當剝盡之時能剛反之與不能剛反之也聖人重以為戒深有見於陽之不可遠也如是夫震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉象曰天下雷行物與無妄先王以茂對時育萬物初九無妄往吉象曰無妄之往得志也六二不耕穫不菑畬則利有攸往象曰不耕穫未富也六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也九四可貞無咎象曰可貞無咎固有之也九五無妄之疾勿藥有喜象曰無妄之藥不可試也上九無妄行有眚無攸利象曰無妄之行窮之災也卦之無妄乃真實無僞即誠者天之道也人能念慮不淆惺存不滅循事理之當行識天命之本體則得元亨也但無妄而貞者不惟妄念不形即無妄之念亦不可著也曰匪正者不惟以妄滅妄為非即以心照心亦不為正也安望其為攸往之利乎此卦乾為體而震為用陰輔乎陽之說也夫旡妄之為卦也以坤之初變震之初純柔變為天德之剛有去妄為正之象矣初以剛自外而主於內五以剛居中而應於下下剛而動上剛而健私欲不萌柔邪自滅所動自健任有為而不撓於物欲所應自中任酬酢而不雜於詭隨如此而行則大亨以正能順天之命也天命人心之判在於危微隱顯之交設有不正則不利有所往即欲往焉無所之矣人之游衍動作莫非天也妄則逆天逆天而行其能行哉象以天下雷行震動發生至誠翕聚物與無妄者也曰物與不言與物者蓋雷不期物而行物不待雷而發茲無妄之至也先王觀此以茂對天時養育萬物順萬物而不逆萬物養天下而不私天下正所謂因時而施非有心於迎時也因物而化非有心以合物也體天道之自然各得其性命之正而全於無妄者也初當純一未分篤實無妄四以天德為主外無牽引初無所應而行四無所應而守皆以天命為行止而不以私心為行止此無妄之正者也凡學有計較得失之心皆妄也有怨尤憎忿之心者亦妄也二以正應正故為無妄之福三以陰居陽故為無妄之災不耕而穫不菑而畬福非有求也且以動之順而得之不為計較之私也或繫之或得之災非自作也然以動之妄而觸之不免有怨憎之起也二處柔為正三應上為妄甚矣順動之間宜正而不宜妄也五與二雖非中正相應而上剛下柔才不相協中外之變起於不虞疾之致也但無妄之世邪佞屏斥感應無間始雖未侔終必相濟矣故曰勿藥有喜也上九居乾之終當健之極事宜靜而知止不宜動而妄行也若不知變化與時俱抗則有眚矣噫禍福存亡本無定轍總由於人欲天理之存凡人主之威强既廣則當養民息兵人臣之功業既盛則當引身知退故動而柔順正也動而過剛非正也動而過剛蓋溺於欲之無厭也欲而無厭妄之所由來禍之所由伏也嗚呼乾道變化各正性命夫焉有妄哉亦因人欲無厭斯有妄也妄則不能復其真心矣是以禍福成敗一聽於天而無所期望旡所設想安於義命之自然即所謂無妄也故戒剛約柔養陽制陰此無妄之所以繼復也經言無妄又戒言利貞戒之匪正者何也恐人跡雖無邪心有偏倚即為妄已如仲子之廉莊子之放其為人豈求福計利者哉因存一念之偏即非天命人心之正若以之處世輒多過眚豈可以為經方軌物之道哉則知易之極深研慮申戒於人心之初也至矣乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也象曰天在山中大畜君子以多識前言往行以畜其德初九有厲利己象曰有厲利己不犯災也九二輿說輹象曰輿說輹中無尤也九三良馬逐利艱貞日間輿衛利有攸往象曰利有攸往上合志也六四童牛之牿元吉象曰六四元吉有喜也六五豶豕之牙吉象曰六五之吉有慶也上九何天之衢亨象曰何天之衢道大行也大畜者含弘廣藴之義也夫含蓄之懷貴於光大又貴乎貞正以聖賢為宗不以曲學為附大而能止與物無礙故曰大畜利貞也畜之大者施為必大故窮居獨善不能展布王家非大也受祿而尸素無謀不能濟天下之險難亦非大也故曰不家食吉利涉大川斯為大畜之象也此卦艮為體而乾為用陰止乎陽之說也凡吾人學術經綸必躬行實踐以剛健為先始合乎德性之用不為勉强之失未事時胸中不可存一毫之寬假措手處胸中又不可著纖忽之虛浮懇摯日新暗然章光自不可掩故曰篤實輝光日新其德也然猶不可自限也循此而上之以剛德而尚乎千古之聖賢以止機而合乎天行之健體乃為大正之學術也進有道而止不泥非至正者不能也以所畜之正際之大行之會動與天俱相時而行可以立功而利也矣象以天至大而在山中大畜之象也君子體此以為德由畜而大凡前言往行多識以為修德之備蓋天下之物無非心也多聞廣識以畜其心之德則無耳目之支離也此畜所以愈大也初以剛居剛故抑其鋭二以剛處中故安於鈍三以剛應剛與上同德進無違距者也然得意於功名者即失意於道德宜知艱而自防亦不可輕於進者也故曰良馬逐利艱貞也四居臣位其制邪也致其詳民德之污隆關於大臣之憂喜四能防微杜漸如童牛之牿慮於未發之前禁於已發之後則得勝殘去殺之術矣大善而吉也五居君位其制邪也操其要民情之格化由於君心之警惕五能正本淸源如豶豕之牙道之斯行止之則戢則刑淸民服大胥慶已上九處畜之極畜極則通剛明之賢進無阻塞治化四達如往來於天衢也曰道大行者猶之周公以東山之斧滌皇路之大淸共濟天下之險而涉川之功成矣此豈非一道同風之化乎夫乾進也曰利已曰說輹曰艱貞理貴以止為進者也艮靜也曰牿牛曰豶豕曰亨衢事貴以靜制動者也彖曰尚賢而爻曰制邪者去邪正所以畜賢也體乎此而參和不偏所謂日新其德也已震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉象曰山下有雷頤君子以愼言語節飲食初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也六二顚頤拂經於丘頤征凶象曰六二征凶行失類也六三拂頤貞凶十年勿用無攸利象曰十年勿用道大悖也六四顚頤吉虎視耽耽其欲逐逐無咎象曰顚頤之吉上施光也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也頤為正養之道也夫養之係於吾身不小則養之之義存於吾心者以正而吉然正與不正介於隱忽之間者最微必養德出於性命之合而不為他歧之惑養身持於義理之節而不為飢渴之害乃為人心道心之交歸也此卦艮為體而震為用陽納乎陰之說也頤之為卦上艮下震動而求養靜而知止養道之善者也養之不貞嗜欲紛雜義理蔑羅維且戌一如則妄動而失所養矣必身心有主貞而始吉也卦畫上下二陽中含四陰外實中虛為頤頷之象也陽為實實能養陰故曰觀頤也陰為虛虛則受養於陽故自求口實也推頤之道而極言之天地施澤以養萬物聖人弘道以養萬民養之以時即得乎天理人情之正也象以山下有雷閉固節藏不過於動頤之象也蓋山之廣大物無不養而雷所以發動其生養者也山止而能生雷動而能止生化不息君子體此而愼言語節飲食皆所以止其動也然愼非不言也當時有可言雖披鱗而不羡乎括囊節非不食也當時宜不食雖採薇而不惜乎邱壑能如是豈惟養身德亦養矣如初之陽剛足以自養而纍於動體偶為富貴所移即失於性靈之固有猶靈龜之舍也舍素修之操甘非義之祿朵頤之凶其自致也二陰柔不能自養資身無策者也求養於初卑賤之比遺譏於士類越五以為養斥辱之恥又見誚於庸流拂其正養之道故為顚頤之悖也惟安於丘園猶可頤也若更往而求上必失類而凶也三以陰之質居動之極不安於養矯世自高織屨劈履之流拂養之道者也故曰拂頤其所守雖止而不免有傷於物不可以用世故曰十年勿用無攸利也四應於初賴其養以施於下故曰顚頤吉也求賢養人而不求自養其威嚴可重天下仰之如虎視耽耽也其欲逐逐者專志求賢始終靡間反已之功可謂深矣崇貨以自殖則所處卑鄙貴德以養民則所施光明也六五以陰柔居上僅於自養者也夫養天下者乃君之大經也今不能以善養人而用人以養是為拂經之甚也然居貞守志果能篤於任賢則天下亦蒙其澤可得為吉也若冒昧行之養無所備其為涉川之險何恃而不恐哉上九以剛陽處極責任既重施豫亦繁不可不存心惕懼保其弘濟之安故曰由頤厲吉利涉大川也然五六過則為拂吉之在貞上九濫則為瀆吉之在厲一曰不可涉大川一曰利涉大川者君不可喜功臣不可避事也君喜功而天下不得養矣臣避事而天下失所養矣皆非頤之道也六爻上三爻吉而下三爻凶者下妄動而上能止也曰逐逐曰貞曰厲皆所以善用其養本於義理之宜而不過於性情之偏者也是以古來經濟必從兢業中出吾既體乎天地同德之心則天下萬物皆托命於我苟精神一息不運恩澤一物不周則天下萬物不得所養者多矣若拂於以上養下之正而己飢己溺之意烏能自慊於天下之任耶巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遁世無悶初六藉用白茅無咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也上六過涉滅頂凶無咎象曰過涉之凶不可咎也大過者過於時也時事過於常則政教流於敝權衡失其平非庸庸柔弱者所能克復其過也必有大過人之才起而振刷其間始可以濟時之失通時之變措國事於亨也此卦巽為體而兌為用陰滅乎陽之說也夫聖人之心如權衡然不與物為低昻亦不為世道所沈溺當衰難之時事有所不得已勢有所不能遂即挺然濟變越常理以勒奇勳挽頽風而歸正化然其於道未嘗不中其節而於心卒未嘗有過者也卦以四陽居中上下二陰不勝其重為棟橈之象但時當大過又以才弱承之不能振作於其始即不能挽復於其後本末俱傾衰難之極也既遭衰難利有所往以拯之故曰棟橈利有攸往也猶幸二五得中內順外說以平易之德而為剛明之濟所以亨也聖人之作事也惟其時惟其中當時大過過而不失乎中非大有德力者其孰能之故曰大者過也象以澤中溢木浸滅失宜大過之象也蓋澤無滅木之理泛濫之極氣不得勝而木為之滅過常之甚也過常之事豈常人所能制哉惟君子獨立無懼遁世無悶乃能然也此其所以為大也凡人情有倚藉之偏即多顧懼之念惴惴然不能自立於危險君子以至夷之心處世之至險以至易之心當世之至難則心無所賴於世而始能救世之過也初當過時以柔處下既能謹密復善圖維可免害耳未得為大過之咎也二得中居柔復比於初是剛過之人而能以柔相濟者也老過則枯少過則稚以老資少則稚者長以稚分老則枯者榮當至衰而如至壯以至壯而輔至衰過而不為過也大過之善者也其枯楊生稊之謂歟三以剛居剛係於上而拂於下動違中和物莫之輔大過之失者也故為棟橈之凶四剛柔合德不過乎剛才可以肩鴻而任巨已若處事不加詳杜佞不深至是有大過人之志而不能行大過人之事終有他吝也五當陽過之極又比於過極之陰元氣既衰功業必薄不足以共有為也惜乎有大過之位而未能盡大過之道象為枯楊生華無益於枯老婦士夫終難生育也上當危急之秋不知才弱自安反以陰越陽好為抗激之事是履險犯難僅知拯救於時而不知拯救於身有滅頂之凶也然有濟過之心不獲濟過之益於義則無咎大抵陰宜愼而不宜過故藉茅則吉滅頂則凶陽宜濟而不宜過故二四則為利三五則不利也然則大過之所謂大過者義當取於無過也雖然末世盡浮沈也人情易反覆也不測之險巇忽形於俄頃自完之全局誰能必於將來苟非慮於無可慮之先防於未及防之際者亦不能為天下之任過者也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉象曰水洊至習坎君子以常德行習教事初六習坎入於坎窞凶象曰習坎入坎失道凶也九二坎有險求小得象曰求小得未出中也六三來之坎坎險且枕入於坎窞勿用象曰來之坎坎終旡功也六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也九五坎不盈祗既平無咎象曰坎不盈中未大也上六係用𡽪置於叢棘三歲不得凶象曰上六失道凶三歲也坎為北方之卦也重坎險之極也聖人觀坎之象為險難之義故於重卦中而獨言習也蓋險難之時非經便習不可以行故曰習坎也能以實心安於義命靜觀時變不為僥幸之圖素位而行終可成出險之功乃為行有尚也此卦以金為體以木為用陽主乎中之說也水內陽而外陰天德凝於中化機應於外但卦體重險平陂之勢不分趨避之情難見知愚皆自失者也猶幸陽在內為有孚之象也明在內是心亨之義也誠則明生既有真見自無疑事故曰有孚維心亨也能亨則雖險而夷也剛中自守陷於勢而不陷於義以此而行宜有尚也內亨外暗內剛外順茲處險而出乎險者也故水流而不盈行險而不失其信聖人以此釋坎之有孚也第水來重險陵谷傾陷非淺岸平溪之所比也王公觀其勢之必行設戒預防法天險之無形設為紀綱法度之防法地險之有形設為城池甲兵之備其為用時之險亦可謂深切而周至也矣象以水流洊至兩險相仍習坎之義也君子習於坎然後乃能不以險難為困故德行不失其常使利害得遠於身心教事不弛於習使理義日新於聞見以此而濟身即可以濟天下之險難也凡處險者以陰柔之質居重險之下上無援應又無自濟之才如初之入於坎窞者是也當上下之重陰雖未能出然有剛中之德德足以孚人才足以自衛如二之求小得者是也但上下俱陰柔弱不足以當大援故云小得也若內無濟險之才時又當多難之衝所與非人而所履亦非其位出之則坎居之亦坎支枕不安其陷亦深用之不能有功者六三是也四當險而處柔且得位而承剛故曰剛柔濟也至德為之主太和為之表所以終無咎也但當險難之時非明信結於君何以得行其志故一樽之酒二簋之食以缶為用不假虛飾質之至也質實之人易失於徑直必自牖而納委曲以行始得乎用險之宜也五以陽剛之才處極尊之位中而且正可以有為也然適在坎中未能遽出有須待之義故曰坎不盈祗既平也坎不盈猶有險也祗既平則無險矣陽動而上不終陷也上以陰柔不振之才而當重險危疑之日更下乘五剛將有係置之患已故曰係用𡽪棘纆置於叢也險終乃反置於悔過之地三歲之後或可求復故曰上六失道凶三歲也坎六爻雖不同義惟陷於陰則險斯成惟居於陽則險可濟噫豈惟世事有陷溺哉即人心亦有之也苟非剛中之君子烏能得與於斯蓋水為生物之先利為事機之始水溢為陷利聚為害重險者界於利害之間者也且水之性為智以智相競則與勢相傾傾險成習陷溺之所由來也故武王曰吾與其溺於人寧溺於淵溺於淵尚可救也溺於人不可救也何也溺於人者固陷溺其心者也離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也象曰明兩作離大人以繼明照於四方初九履錯然敬之無咎象曰履錯之敬以辟咎也六三黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也九四突如其來如焚如死如棄如象曰突如其來如旡所容也六五出涕沱若戚嗟若吉象曰六五之吉離王公也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也離者南方之卦也乾之用為坎而坤之用為離離為火火體陰而用陽也陰附於陽其性炎上易於躁動躁動則失其宜必得畜牝牛之順乃為利貞也正則疑忌不生寵注曰隆吉之徵也此卦木為體而土為用陽蓄乎陰之說也以陽蓄陰相繼為麗故火麗物則明也物之麗者易至於不正故必以正則亨也正則能明君臣上下皆歸於中正則明德可以化天下也文明而治萬物蔚興麗乎天者正中而光大麗乎土者柔順而化生不流於察察不偏於炫惑以恭順之為宣懿美之德如牝牛之豢也貞且吉矣象以兩明繼起炎威交作離之象也大人法此以繼明其德臨照四方蓋明之為明神用於外不能常有必含輝養熄則照臨不絶火傅於薪日繼於夜其道廣也故用晦惟明正所以繼其明也六爻之義皆是意也天下事未有不以敬而成以不敬而敗者初當履錯之日中存敬畏之心不為躁動之事是無紛錯之咎也二柔離自明不激不隨秉中德以事一人人臣之正道可居大善之吉也三處離之終盛極將衰日昃之象也既不安於常道妄為幸難之功徒戚戚於危亡之憂耳四當復明將繼之際國勢漸張人情復振惟敬愼以惜事始無禍也若以剛迫之必為死如棄如之患也五柔離乎中雖非過弱然不得其正迫於上下之制政權下移不免有涕嗟憂懼之形矣上九處離之終明過之極明之為用在去邪遠惡故曰王用出征然曰有嘉折首獲匪其醜則刑罰不濫亦能愼其明者也當繼明之任梗化亂治不得不嚴非以好大也若好大用兵傷民於和則不明甚者矣故曰王用出征以正邦也前離則鼓缶而後離則出征者因作者過於動故止之繼者安於逸故振之也臣之炎盛則不能以剛為柔者也君之憂嗟則能以柔為剛者也故臣死棄而君獲吉也初居下之下四居上之下志皆躁動者也但初愼於進四急於進故吉凶之所由異也曰突如其來則非所謂履錯然者也曰履錯然者將進不進徘徊躊躇其跡紛錯然也鳴呼聖人於剛柔進退之際詳審如此則知用明之道匪易易也
