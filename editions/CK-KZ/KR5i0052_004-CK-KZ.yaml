front:
  text: 易說河圖圖洛書圖混極圖圖混極者虛中之象也苞象數於淸濁未分之内具形器於圖書將判之先其氣機畢具者言兩儀四象八卦之理闇然藏伏所謂體不雜乎陰陽之太極也形器己呈者言雖有儀象卦畫之分而其所以然之理初無聲臭之可求所謂用亦不離乎陰陽之太極也元極圖圖元極者本元始之凝合藏太和之絪緼粹至精而無色含一炁而無形正有物渾成先天地生之謂也居混沌之先淸濁一致具陰陽之體變化有機包三古而立混極之元還終天而爲始天之化兹非太極之氣母乎是以知無終盡之機者易也有相生之本者乃元極之神也性超無極而獨立者乃能見之靈極圖圖靈極者藏妙有於虛靈之内體眞無於有極之先不別而自分不鑿而自竇將以啟造化之初機發靈光之始竅經云常無欲以觀其妙有欲以觀其竅正此時之探取也道虛則大心虛則靈故靈極爲天地之始竅卽爲萬物之化源也太極圖圖太極者靈極之漸闢而漸虛者也洞然不雜於陰陽朗然不虧於元體存變化於無定極之中而陰陽自有至定極之理所以上之一卽陽之奇也下之二卽陰之偶也其中以奇偶之畫合而歧之卽人也人之用出於陽之上而包於陰之外故能參天兩地而成位乎其中也不言元極則太極同於一物而不足爲萬化之本根不言太極則元極淪於空寂而不能爲萬物之資始是以動靜無端陰陽無始正太極之妙用也中極圖圖中極者卽靈極本來之眞體太極初分之始機向之凝者漸融形者漸運陽動而上動中有陰陰靜而下靜中有陽靜極則爲動之體動極卽爲靜之用交相體用運行不息靜則陰之體立而陰以分動則陽之用行而陽以分但陰陽當以上下分不當以左右列動靜當以生中含化不當以極後推復也故太極本自嶷然乘氣機而端變化本於剛柔相生之至理非有顚倒造化之能轉移乾坤之力者不能知其所以然之妙也少極圖圖少極者一奇立於其中二偶分於左右陽氣屈曲於其下積氣尙微生機尙伏故謂之少也但陽旣動而輕淸者上浮陰旣靜而重濁者下沉則天氣升而生化地氣降而化生由是一元眞炁充塞兩間生生不窮化源具備己如陽始生爲水水尙柔弱必至生木而氣始强盛陰始生爲火火尙微𣺌必至鍊金而力始堅固故水爲陽之穉木爲陽之盛火爲陰之穉金爲陰之盛也老陽老陰不能復生必得少陽少陰而後能成生育之功少極繼生生於太極之後者豈非爲三才之朕乎太陽圖圖太陽者曰也以太極之全體一畫橫亘於其中精實而不虧故日爲太陽之象也但曰雖陽精質本乎陰燠萬物而化光者必資於月質之合始陽得蔽而不洩是以日之體本陰陰之精藏乎陽也得其體則萬古不變相兼以成者卽相待以久之理也此日之所以交於月而成易也太陰圖圖太陰者月也以太極之分形二畫並列於其中精虛而不盈故月爲太陰之象也但月雖陰精質本乎陽麗萬物而有常者必借於日光之合始陰有主而不散是以月之體本陽陽之精藏於陰也得其用則盈虛有度相尅於隱顯者卽相制於上下之理也此月之所以承於日而成易也象明圖圖象明者因日月之象而合之以成明因日月合明而體之以成易故懸象著明莫大乎日月日月之道貞明者也貞明者易之義也蓋日東月西則爲明日上月下則爲易陰陽變化特一旋轉運用之間耳故易之體用不膠於離南坎北之方位不暌於先天後天之推移隱顯融通一名而含三義其易之謂乎以交代而名則曰易所謂生生不窮是也以常體而名則曰不易所謂定位不移是也以改革而名則曰變易所謂變則必通是也易者其德也不易者其位也變易者其氣也以往來環轉之機律上下一中之理豈非日月相推而明生焉之謂乎三才圖圖三才者以偶之二疊於奇一之上數象合三乃天地人之全體也天開於子地闢於丑人生於寅以人而具二炁之精立兩儀之極而首出乎其中矣以藐然之身而乃與天地並立爲三至其爲道又與天地混然而無間其可不知所以自立之義哉蓋盈天地之間者惟萬物而人居萬物之一物之感人人之應物無時不然及其擴充運用正三綱明五教序萬事窮理盡性以至於命致中和贊化育參天地而相與於無窮者人又與太極同其功用也故易之爲書也廣大悉備有天道焉有人道焉有地道焉立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義也是以三才之統還於太極之一也八卦合洛書圖圖
