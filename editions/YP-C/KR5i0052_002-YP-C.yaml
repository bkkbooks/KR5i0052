front:
  text: 易說題詞古今來講易者不下數十百家類皆各抒所見或言理或言數斤斤辨論於卦爻之内縱極會而通之觸類而長之究於羲畫以前之易固未有當也我孚佑帝師本上古皇覃氏臨凡洞澈乾坤之隱奧了明性道之根源自唐成進士後屢有闡易微義垂示法言惜未彚傳於世兹夀山堂易說乃古洞藏本試拈香默玩洗心莊誦覺聖言亹亹未嘗不依文解義而實已超超乎高挹象數之表將羲文周孔之心傳一一指出至矣盡矣𤓰以加矣至首卷圖解發前聖所未發驀然啟視如披三清秘笈開玄㝔覩天文矣夫易心易也天人相合之妙古今不變之機皆載於易卽人之視履考祥其旋元吉亦於易備之此身心性命之學也道之原也帝師安能巳於言哉孔子曰五十學易可無大過五與十皆河洛之中也中心之謂也惟從心上加功故說可無大過學者三思之當知假年之說未必與此五十二字強爲膠粘而言之如是說易乃深合羲文周孔之心源也憶昔孚佑帝師曾將千古未洩之秘盡傳於希夷陳先生俾嘉惠後學數傳而至穆修乃得邵康節先生而廣演之我帝師又親與証明重加指授現身說法世所習聞兹因重訂全書正宗敬述於此以作原起云爾
