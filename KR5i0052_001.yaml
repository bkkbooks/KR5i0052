front:
  text: 易説易説自序聖賢之學豈有高遠難幾者哉亦曰明乎天道以人合之而已矣夫以人合天抑豈有他哉亦曰與時偕行而已矣時未至則有靜默之守時既至則有滿盈之戒察乎陰陽之消長於以識吉凶悔吝之幾故聖賢用顯用晦變化無方而進退咸宜焉由此觀之與時偕行非即聖賢之學哉第小儒曲學昧於從違往往宜晦而顯宜退而進靜默不知守滿盈不知戒或失之躁或失之亢幾萌不惕變至不審日趨於凶咎悔吝之途而人道淪沒聖人於是作易以明天道於六爻之中著陰陽之變化盈虛消息進退存亡皆寓於其內其示人以趨避也至矣然其義顯矣而又甚隱其辭明矣而又甚微淺者或以為占筮之書深者或以為天機之祕京房輔嗣焦生子雲之流所見尚如是矧下焉者乎孰知大而邦國之治亂小而身家之盛衰與夫持躬涉世處人接物均不越乎易焉大哉易乎利用安身之道達天知命之學舍易何適哉夫聖人往而微言絶易道不明天人學晦疇為憂盛危明永得無失者乎孔子曰加我數年五十以學易可以無大過矣寡過之學誠莫如易易其可不學乎哉故豫有世道人心之憂焉乃取六十四卦詳為説辭明為剖晰後之學者觀象玩占於陰陽消長辨吉凶於幾先進退顯晦不失其道庶幾治國守家保身理物皆有賴焉余之説易未敢云有功於易然以人合天之理啓迪來學使利貞常獲無蹈危機是余之志也夫
